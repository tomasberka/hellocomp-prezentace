function toggle(head) {
  const body = head.nextElementSibling;
  const chev = head.querySelector('.chevron');
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  chev.classList.toggle('open', !isOpen);
}

function copyScript(btn, i) {
  const s = scripts[i];
  const text = `🎬 HOOK:\n${s.hook}\n\n📖 OBSAH:\n${s.body}\n\n📣 CTA:\n${s.cta}`;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Zkopírováno';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Kopírovat scénář'; btn.classList.remove('copied'); }, 2000);
  });
}

let currentFilter = 'all';
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  filterCards();
}

function filterCards() {
  document.querySelectorAll('.card').forEach(card => {
    const p = card.dataset.prio;
    const cats = card.dataset.cats.split(',');
    let show = true;
    if (currentFilter !== 'all') {
      if (['100','66','50','33'].includes(currentFilter)) show = p === currentFilter;
      else show = cats.includes(currentFilter);
    }
    card.style.display = show ? '' : 'none';
  });
  const visible = document.querySelectorAll('.card:not([style*="none"])').length;
  document.getElementById('counter').textContent = visible + ' scénářů';
}

function renderCards() {
  const grid = document.getElementById('grid');
  grid.innerHTML = scripts.map((s, i) => {
    const totalChars = s.hook.length + s.body.length + s.cta.length;
    const prioClass = `tag-prio${s.prio}`;
    const prioLabel = s.prio === '100' ? 'Priorita 100 %' : s.prio === '66' ? 'Priorita 66 %' : s.prio === '50' ? 'Priorita 50 %' : 'Priorita 33 %';
    const catTags = s.cats.map(c => {
      const labels = {hry:'Hry', hw:'Hardware', kategorie:'Kategorie PC', navod:'Návod'};
      return `<span class="tag tag-cat">${labels[c]||c}</span>`;
    }).join('');
    return `<div class="card" data-prio="${s.prio}" data-cats="${s.cats.join(',')}">
      <div class="card-head" onclick="toggle(this)">
        <div class="card-num">${String(i+1).padStart(2,'0')}</div>
        <div class="card-meta">
          <div class="card-title">${s.title}</div>
          <div class="tags">
            <span class="tag ${prioClass}">${prioLabel}</span>
            ${catTags}
          </div>
        </div>
        <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="card-body">
        ${s.url ? `<div class="url-row">🔗 <a href="${s.url}" target="_blank">${s.url}</a></div>` : ''}
        <div class="section"><div class="section-label hook">▶ Hook (první 3 vteřiny)</div><div class="section-text">${s.hook}</div></div>
        <div class="section"><div class="section-label body">📖 Obsah</div><div class="section-text">${s.body}</div></div>
        <div class="section"><div class="section-label cta">📣 CTA</div><div class="section-text">${s.cta}</div></div>
        <div class="chars">${totalChars} znaků</div>
        <button class="copy-btn" onclick="copyScript(this,${i})">Kopírovat scénář</button>
      </div>
    </div>`;
  }).join('');
  document.getElementById('counter').textContent = scripts.length + ' scénářů';
}

renderCards();
</script>
