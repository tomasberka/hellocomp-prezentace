ellocomp.cz/herni-pocitac-do-30-000-kc/", "hook": "Třicet tisíc korun — to je magická hranice, za kterou se herní PC přestává kompromisovat a začíná opravdu excelovat. Dneska si projdeme přesně, co vám tato investice přinese.", "body": "Za 30 000 korun vstupujete do kategorie, kde už opravdu nemusíte nic řešit. Procesory třídy Ryzen 7 7700 nebo Intel Core i7-13700 v kombinaci s grafikou RTX 4070 nebo RX 7700 XT vám umožní hrát na vysokých nebo ultra nastaveních v rozlišení 1440p.\n\nA 1440p je dnes zlatý střed — krásný obraz, rozumné nároky na GPU, výborný poměr cena-výkon. Ani 4K s jeho přehnanými nároky, ani Full HD, kde výkon přebývá.\n\nVe 30 000 korunách je navíc prostor na 32 GB DDR5 RAM. To je budoucnost — nové hry jako Hogwarts Legacy nebo Alan Wake 2 rádi spotřebují přes 20 GB při modování nebo vysoké kvalitě textur.\n\nDostanete také větší NVMe SSD — ideálně 1 TB — takže se nebudete muset rozhodovat, co nainstalovat a co smazat. A solidní PC skříň s dobrým airflow, která udrží celou sestavu v teplotně přijatelném režimu i při delším herním sezení.\n\nV HelloComp si sestavy za tuto cenu sami konfigurujeme a testujeme tak, aby vám vydržely klidně 5 až 7 let bez nutnosti výraznějšího upgradu.", "cta": "Máte dotaz na konkrétní hru nebo využití? Napište do komentářů nebo nám zavolejte — rádi vám doporučíme přesnou konfiguraci. Odkaz na aktuální nabídku najdete v popisu.", "url": "https://www.hellocomp.cz/herni-pocitac-do-30-000-kc/"}, {"title": "Nejlepší herní počítače — jak je skutečně poznat?", "priority": "p100", "priorityLabel": "100 %", "tags": ["p100", "výběr"], "seoUrl": "https://www.hellocomp.cz/nejlepsi-herni-pocitace/", "seoLabel": "hellocomp.cz/nejlepsi-herni-pocitace/", "hook": "Co přesně znamená nejlepší herní počítač? Toto slovo používá každý prodejce — ale skutečná kritéria pro to, co je opravdu nejlepší, jsou konkrétní a měřitelná. Pojďme si je projít.", "body": "Nejlepší herní PC není nutně to nejdražší. Nejlepší herní PC je takové, které maxim ull HD gaming na středních nastaveních.\n\nCo dělá levný PC špatnou koupí? Pochybné komponenty od neznámých výrobců, příliš slabý zdroj bez certifikace, nebo starý hardware vydávaný za nový. Dalším rizikem je nízká záruka nebo nulový servis po prodeji.\n\nKupovat levné herní PC od neznámého prodejce na bazaru bez záruky je ruleta. Třeba dostanete výhodný kus, třeba dostanete problém, který se projeví za tři měsíce.\n\nV HelloComp máme v nabídce repasované herní počítače — tedy ověřené zánovní sestavy s garancí funkčnosti a zárukou. To je chytrá cesta, jak dostat maximální výkon za nízkou cenu bez rizika.", "cta": "Byl váš první herní PC levná výhodná koupě, nebo jste si ho pořádně připlatili? Napište do komentářů — zajímá mě vaše zkušenost. Odkaz na naši nabídku levných herních PC je v popisu.", "url": "https://www.hellocomp.cz/levne-herni-pocitace/"}, {"title": "Jak vybrat herní PC — kompletní průvodce", "priority": "p100", "priorityLabel": "100 %", "tags": ["p100", "výběr"], "seoUrl": "https://www.hellocomp.cz/jak-si-vybrat-herni-pc/", "seoLabel": "hellocomp.cz/jak-si-vybrat-herni-pc/", "hook": "Výběr herního PC je na první pohled složitý — CPU, GPU, RAM, SSD, základní deska. Ale ve skutečnosti stačí zodpovědět tři otázky. A já vám teď ukážu, jaké.", "body": "Otázka číslo jedna: Co budete hrát? Různé hry kladou různé nároky na hardware. Pokud hrajete hlavně esport tituly — CS2, Valorant, Fortnite — klíčová je frekvence snímků za sekundu a rychlost procesoru. Pokud hrajete AAA single player hry — Cyberpunk, Red Dead, Hogwarts Legacy — klíčová je grafická karta.\n\nOtázka číslo dvě: V jakém rozlišení chcete hrát? Full HD 1080p je dnes stále nejrozšířenější a nejdostupnější. 1440p je prémiový standard s výborným poměrem cena-výkon. 4K je pro náročné a zároveň nejtěžší na hardware a peněženku.\n\nOtázka číslo tři: Jaký je váš rozpočet? A tady platí jednoduchá rovnice — čím více investujete, tím déle vám PC vydrží bez nutnosti upgradu. Za 20 tisíc dostanete solidní Full HD herní PC, za 30 tisíc pohodlné 1440p hraní, a za 40 tisíc i výš máte prostor pro 4K nebo vysokou snímkovou frekvenci.\n\nNa webu HelloComp jsme k tématu výběru herního PC napsali kompletní průvodce — odkaz je v popisu videa. A pokud chcete poradit osobně, zavolejte nebo napište — rádi vám pomůžeme vybrat přesně to, co potřebujete.", "cta": "Jaké hry hrajete nebo plánujete hrát? Napište mi do komentářů a já vám řeknu, co přesně hledat a jaký budget dává pro vás smysl.", "url": "https://www.hellocomp.cz/jak-si-vybrat-herni-pc/"}, {"title": "Herní PC do 15 000 Kč — jde to vůbec?", "priority": "p66", "priorityLabel": "66 %", "tags": ["p66", "budget"], "seoUrl": "https://www.hellocomp.cz/herni-pocitac-do-15-000-kc/", "seoLabel": "hellocomp.cz/herni-pocitac-do-15-000-kc/", "hook": "Patnáct tisíc na herní PC — jde to vůbec? Odpověď je ano, ale s podmínkami. A ty podmínky vám teď upřímně vysvětlím.", "body": "Herní PC do 15 000 Kč je na trhu nejnáročnější kategorie z pohledu výběru komponent. Tam kde za 20 tisíc máte větší prostor pro chybu, tady se každá koruna počítá.\n\nCo realisticky očekávat? AMD Ryzen 5 5600 nebo starší Intel i5 v kombinaci s grafikou Radeon RX 6600 nebo GeForce RTX 3060 — to je základ pro hraní ve Full HD na středních nastaveních. Počítejte s 16 GB DDR4 RAM a 512 GB SSD.\n\nCo naopak v tomto rozpočtu nedostanete? Vysoký framerate v nových AAA hrách na ultra nastaveních. 1440p gaming s plynulostí. A RGB belíčka po celé skříni — to je v tomto segmentu luxus.\n\nCo je ale klíčové: nekupujte herní PC do 15 000 od neznámých prodejců s pochybnou zárukou. Rozdíl mezi dobře složenou a špatně složenou sestavou za stejné peníze může být propastný.\n\nV HelloComp nabízíme repasované herní PC právě v tomto cenovém rozsahu — zánovní hardware, plně otestovaný, s certifikovanou zárukou. Odkaz najdete v popisu.", "cta": "Hrajete na PC do 15 000? Napište, co hrajete a jak jste spokojeni — rád se podělím o tipy na optimalizaci výkonu.", "url": "https://www.hellocomp.cz/herni-pocitac-do-15-000-kc/"}, {"title": "Herní PC do 40 000 Kč — prémiová kategorie", "priority": "p66", "priorityLabel": "66 %", "tags": ["p66", "budget"], "seoUrl": "https://www.hellocomp.cz/herni-pocitac-do-40-000-kc/", "seoLabel": "hellocomp.cz/herni-pocitac-do-40-000-kc/", "hook": "Čtyřicet tisíc na herní PC — to je hranice, kde přestáváte dělat kompromisy. Dneska si projdeme, co přesně za tuto částku dostanete.", "body": "Za 40 000 korun vstupujete do prémiové kategorie. Procesory jako Ryzen 9 7900X nebo Intel i9-13900K v kombinaci s RTX 4070 Ti nebo RX 7900 GRE vám umožní plynulé 1440p hraní s vysokým frameratem nebo 4K gaming s rozumnými nastaveními.\n\n32 GB DDR5 RAM je v tomto rozpočtu standard. 2 TB NVMe SSD je reálně dosažitelné. A navíc máte prostor na kvalitní vodní chlazení, které udrží teplotní výkon i při delším hraní nebo streamování.\n\nPC za 40 000 Kč by mělo vydržet bez upgradu klidně 6 až 8 let — samozřejmě záleží na tom, jak rychle se budou vyvíjet nároky nových her.\n\nJedním z klíčových tipů je toto: neinvestujte všechno do GPU a šetřete na zdroji. Levný zdroj je nejčastější příčina poruch v jinak výkonných sestavách. Kvalitní modulární zdroj od Seasonic nebo be quiet! se v tomto segmentu opravdu vyplatí.\n\nKonkrétní konfigurace herních PC v tomto cenové hladině najdete na webu HelloComp — odkaz je v popisu.", "cta": "Plánujete investici do PC za 40 tisíc? Napište mi, co od PC očekáváte — rád vám doporučím konkrétní konfiguraci na míru.", "url": "https://www.hellocomp.cz/herni-pocitac-do-40-000-kc/"}, {"title": "Repasované herní PC — zlatý důl pro chytré nakupující", "priority": "p66", "priorityLabel": "66 %", "tags": ["p66", "budget"], "seoUrl": "https://www.hellocomp.cz/repasovane-herni-pc/", "seoLabel": "hellocomp.cz/repasovane-herni-pc/", "hook": "Repasovaný počítač — pro někoho sprosté slovo, pro chytré nakupující zlatý důl. Dneska vám vysvětlím, proč je repasovaný herní PC jednou z nejlepších hodnot na trhu.", "body": "Repasovaný herní PC je takový, který byl vrácen, použit nebo sestaven ze zánovních komponent a prošel kompletní kontrolou, testováním a čištěním. Není to bazarový kus bez záruky — nebo alespoň by neměl být, pokud ho kupujete od seriózního prodejce.\n\nCo tím získáte? Ušetříte typicky 20 až 40 procent oproti nové sestavě stejného výkonu. To znamená, že za peníze, které byste dali za nový herní PC do 20 000 Kč, dostanete repasovaný PC v hodnotě 25 až 28 tisíc — tedy o generaci výkonnější hardware.\n\nKlíčové je ale vědět, na co se zaměřit: GPU a CPU musí mít prokázanou historii bez závad. Zdroj by měl být otestovaný na plnou zátěž. A záruční podmínky musí být jasně dány — ideálně písemně.\n\nV HelloComp nabízíme repasované herní PC s plnou zárukou a dokumentací všech komponent. Každý kus prochází naším technickým testováním a dostanete přesný přehled, co v sestavě je.", "cta": "Máte zkušenost s repasovaným PC? Nebo se ještě bojíte do toho jít? Napište mi — rád vaše obavy rozveji. Odkaz na aktuální nabídku je v popisu.", "url": "https://www.hellocomp.cz/repasovane-herni-pc/"}, {"title": "Jak vybrat grafickou kartu — přesný framework", "priority": "p100", "priorityLabel": "100 %", "tags": ["p100", "hardware", "výběr"], "seoUrl": "https://www.hellocomp.cz/jak-si-vybrat-grafickou-kartu/", "seoLabel": "hellocomp.cz/jak-si-vybrat-grafickou-kartu/", "hook": "Grafická karta je srdce herního PC a zároveň nejčastější zdroj zákazníkových otázek. Dnes vám dám přesný framework pro výběr — bez zbytečného technického žargonu.", "body": "Začněme nejdůležitějším parametrem: cílové rozlišení a framerate. Pro Full HD při 60 fps stačí RX 7600 nebo RTX 4060 — obě jsou skvělé volby do 10 tisíc korun. Pro 1440p při 60 až 144 fps se posouváme na RTX 4070 nebo RX 7700 XT. Pro 4K gaming nebo vysoký framerate v náročných hrách je potřeba RTX 4080 nebo RX 7900 XTX — a to jsou komponenty za 20 tisíc a výše.\n\nDruhý klíčový faktor je VRAM — množství paměti na kartě. Nové hry stále více požadují 12 GB a více VRAM, zvláště pokud hrajete na vysokých texturách nebo v rozlišení nad 1080p. Karty s 8 GB VRAM jsou dnes na hraně budoucnosti.\n\nTřetím faktorem je ekosystém — Nvidia nabízí lepší ray tracing a DLSS technologii pro umělé zvýšení frameratu. AMD má výhodnější ceny za raw výkon a dobrou rasterizaci. Pro hráče bez specifických požadavků je AMD velmi solidní volba.\n\nCo se týká nákupu: nekupujte těžené karty bez záruky a vždy ověřte, zda váš zdroj má dostatečný wattový výkon pro danou kartu.", "cta": "Na jaké hry a v jakém rozlišení hrajete? Napište mi do komentářů a já vám doporučím přesnou grafickou kartu pro váš případ.", "url": "https://www.hellocomp.cz/jak-si-vybrat-grafickou-kartu/"}, {"title": "Čištění a údržba PC — krok za krokem", "priority": "p100", "priorityLabel": "100 %", "tags": ["p100", "navod"], "seoUrl": "https://www.hellocomp.cz/cisteni-a-udrzba-pc/", "seoLabel": "hellocomp.cz/cisteni-a-udrzba-pc/", "hook": "Víte, co zabíjí jinak výkonné počítače? Prach. A přehřívání z tohoto prachu. Dnes vám ukážu, jak správně čistit a udržovat PC — krok za krokem.", "body": "PC by se měl čistit přibližně jednou za šest měsíců, v prašnějším prostředí každé tři měsíce. Čím déle čekáte, tím vyšší jsou teploty a tím vyšší riziko poškození komponent.\n\nCo budete potřebovat? Stlačený vzduch ve spreji — to je základ. Antistatický kartáček na jemné komponenty. A čistý hadřík na sklo a povrchy skříně.\n\nPostup je jednoduchý: odpojte počítač od proudu, otevřete skříň a použijte stlačený vzduch na ventilátory, radiátory a mezery mezi komponenty. Nezapomeňte na filtry — většina moderních skříní je má u čelního panelu a u zdroje. Ty vyjměte a vyčistěte pod tekoucí vodou.\n\nZvláštní pozornost věnujte CPU chladiči — tam se prach akumuluje nejvíce a teploty procesoru mohou kvůli tomu narůst o 10 až 20 stupňů.\n\nPo vyčistění zkontrolujte teploty při zátěži — ideálně pomocí HWiNFO nebo MSI Afterburner. CPU by neměl přesáhnout 85 stupňů při plné zátěži a GPU taktéž.\n\nZvažte také výměnu teplovodivé pasty na CPU — pasta stárne a po třech letech ztrácí účinnost. Výměna trvá 15 minut a může snížit teploty o 10 i více stupňů.", "cta": "Kdy jste naposledy čistili svůj PC? Napište do komentářů — tipuji, že většina přizná, že déle než rok. Kompletní návod je na webu HelloComp, odkaz v popisu.", "url": "https://www.hellocomp.cz/cisteni-a-udrzba-pc/"}, {"title": "Jak zapojit monitor — co se může pokazit?", "priority": "p100", "priorityLabel": "100 %", "tags": ["p100", "navod"], "seoUrl": "https://www.hellocomp.cz/jak-zapojit-monitor/", "seoLabel": "hellocomp.cz/jak-zapojit-monitor/", "hook": "Zapojit monitor zní jako triviální věc — ale víte, jaký je rozdíl mezi HDMI a DisplayPort? A proč záleží, ke které součásti PC kabel zapojíte? Dneska to vysvětlím.", "body": "První a nejdůležitější pravidlo: vždy zapojte monitor do grafické karty, ne do základní desky — pokud tedy máte dedikovanou grafiku. Základní deska sice také disponuje video výstupy, ale ty jsou napojeny na integrovanou grafiku procesoru, která je dramaticky slabší.\n\nPokud zapojíte monitor do základní desky s RTX 4070 v počítači, budete hrát na integrované grafice a ptát se, proč má PC takový výkon. Tato chyba je překvapivě velmi častá.\n\nDruhé důležité téma: HDMI versus DisplayPort. Pro hráče je DisplayPort preferovaná volba — podporuje vyšší obnovovací frekvence jako 144 Hz, 165 Hz nebo 240 Hz bez kompromisů.\n\nStarší verze HDMI 1.4 nebo 2.0 jsou omezené. Pokud máte 144Hz monitor a používáte HDMI 1.4, pravděpodobně hrajete jen na 60 Hz bez toho, aniž byste o tom věděli. Zkontrolujte specifikace kabelu i monitoru.\n\nPo zapojení ujistěte se ve Windows, že máte nastaveno nativní rozlišení monitoru a správnou obnovovací frekvenci. Nastavení → Zobrazení → Rozšířená nastavení zobrazení.", "cta": "Nevíte si rady s nastavením monitoru nebo jste narazili na problém? Napište do komentářů nebo na náš web — rádi poradíme. Odkaz v popisu.", "url": "https://www.hellocomp.cz/jak-zapojit-monitor/"}, {"title": "První zapnutí PC — co dělat krok za krokem", "priority": "p100", "priorityLabel": "100 %", "tags": ["p100", "navod"], "seoUrl": "https://www.hellocomp.cz/prvni-zapnuti-pc-a-odstranovani-problemu/", "seoLabel": "hellocomp.cz/prvni-zapnuti-pc-a-odstranovani-problemu/", "hook": "Dostali jste nový PC a teď nevíte, co dělat dál? Nebo se vám nový počítač ani nespustil? Nebojte — projdeme první zapnutí krok za krokem.", "body": "Po zapnutí nového PC vás přivítá buď rovnou Windows, nebo průvodce nastavením — záleží, zda byl operační systém předinstalován. V HelloComp dodáváme PC s předinstalovaným Windows, takže první věc, kterou uvidíte, je průvodce nastavením.\n\nProjde vás nastavením jazyka, připojením k síti a přihlášením nebo vytvořením Microsoft účtu. Doporučuji zvážit lokální účet, pokud nechcete mít data synchronizována s Microsoftem.\n\nPo přihlášení proveďte Windows Update — přejděte do Nastavení, Windows Update a nainstalujte všechny dostupné aktualizace. Poté nainstalujte ovladače grafické karty — přímo z webu Nvidia nebo AMD, ne z Windows Update. Správné ovladače jsou klíčové pro výkon ve hrách.\n\nPokud se PC při prvním zapnutí ani nespustí: zkontrolujte, zda je kabel pevně zapojen a zda svítí indikátor napájení na zdroji. Nejčastější příčinou problémů je uvolněný RAM modul nebo nezapojený 8-pinový napájecí konektor CPU.\n\nPokud PC pípá při startu — počet pípnutí je chybový kód. Vygooglujte kód ve formátu \"BIOS beep code\" spolu s výrobcem vaší základní desky.", "cta": "Měli jste problém s prvním zapnutím nového PC? Napište nám — rádi pomůžeme to vyřešit. Kompletní průvodce je na HelloComp, odkaz v popisu.", "url": "https://www.hellocomp.cz/prvni-zapnuti-pc-a-odstranovani-problemu/"}, {"title": "Výměna a instalace grafické karty — jak na to", "priority": "p100", "priorityLabel": "100 %", "tags": ["p100", "navod", "hardware"], "seoUrl": "https://www.hellocomp.cz/vymena-a-instalace-graficke-karty/", "seoLabel": "hellocomp.cz/vymena-a-instalace-graficke-karty/", "hook": "Výměna grafické karty je jeden z nejjednodušších upgradů, který na PC můžete udělat — a přitom jeden z největších výkonnostních skoků. Dneska vám ukážu, jak na to.", "body": "Než začnete, potřebujete vědět tři věci. Za prvé, zda váš zdroj má dostatek výkonu pro novou kartu. Každá GPU má uveden TDP — spotřebu ve wattech. Přidejte k ní spotřebu zbytku systému a ujistěte se, že váš zdroj má alespoň 20 procent rezervu navíc.\n\nZa druhé, zda máte volný PCIe x16 slot na základní desce — téměř vždy ano. Za třetí, zda se karta fyzicky vejde do skříně — moderní karty jsou velké a ne každá skříň je pojme. Délka nad 300 mm je u prémiových karet běžná.\n\nPostup výměny: odpojte PC od proudu, otevřete skříň. Odstraňte starou kartu — odšroubujte ji ze záslepky a stiskněte pojistku na PCIe slotu. Vložte novou kartu — pečlivě zatlačte, dokud nezaklapne pojistka.\n\nZapojte PCIe napájecí kabely — typicky 8+8 pin nebo 16-pin konektor u nových karet. Zavřete skříň a zapněte PC.\n\nPrvním krokem po spuštění je odinstalace starých ovladačů přes Display Driver Uninstaller a instalace nových ovladačů pro novou kartu. Nepřeskakujte tento krok — stará a nová generace ovladačů se mohou navzájem bít.", "cta": "Jakou grafiku jste upgradovali nebo plánujete upgradovat? Napište do komentářů — rád poradím s kompatibilitou.", "url": "https://www.hellocomp.cz/vymena-a-instalace-graficke-karty/"}, {"title": "Jak vybrat monitor — tři klíčové parametry", "priority": "p50", "priorityLabel": "50 %", "tags": ["p50", "hardware", "výběr"], "seoUrl": "https://www.hellocomp.cz/jak-vybrat-monitor/", "seoLabel": "hellocomp.cz/jak-vybrat-monitor/", "hook": "Monitor je věc, na kterou koukáte celý den — a přesto ho většina hráčů nakupuje jako poslední a s nejmenší pozorností. Dneska to napravíme.", "body": "Tři nejdůležitější parametry monitoru pro hráče jsou: panel, rozlišení a obnovovací frekvence.\n\nZačněme panelem. IPS panely nabízejí nejlepší podání barev a pozorovací úhly — ideální pro filmový zážitek a barevně přesnou práci. VA panely mají lepší kontrast a tmavé podání — dobré pro tmavé hry a filmy. TN panely jsou nejrychlejší co do odezvy, ale barvy za ostatními zaostávají — používají je profesionální esport hráči. Pro většinu hráčů je IPS nebo VA nejlepší volba.\n\nRozlišení: Full HD 1080p je stále standard pro esport a cenově dostupné herní sestavy. 1440p je premium standard — krásný obraz, rozumná cena. 4K je pro náročné — ale potřebujete odpovídající GPU.\n\nObnovovací frekvence: 60 Hz je naprosté minimum. 144 Hz je absolutní základ pro plynulé herní zážitky dnes. 165 Hz a 240 Hz oceníte v esport titulech, kde každá milisekunda rozhoduje.\n\nDůležité: ujistěte se, že váš PC zvládne daný framerate. 240 Hz monitor nemá smysl, pokud váš PC generuje 60 fps. Podívejte se také na odezvu — 1 ms GtG je pro gaming ideál.", "cta": "Na kolika Hz a v jakém rozlišení aktuálně hrajete? Napište do komentářů — rádi vám poradíme s výběrem. Přehled monitorů na HelloComp je v popisu.", "url": "https://www.hellocomp.cz/jak-vybrat-monitor/"}, {"title": "Chlazení a teploty PC — co je normální a co alarmující?", "priority": "p50", "priorityLabel": "50 %", "tags": ["p50", "navod", "hardware"], "seoUrl": null, "seoLabel": null, "hook": "Přehřátý počítač je pomalý počítač. A v nejhorším případě poškozený počítač. Dnes si vysvětlíme, jaké teploty jsou normální, jaké jsou alarmující a jak je snížit.", "body": "Pojďme si nejdřív říct, co je normální. CPU při běžné práci by se měl pohybovat do 60 stupňů. Při plné zátěži — například benchmarku nebo renderování — je 80 až 85 stupňů přijatelné. Pokud CPU překračuje 90 stupňů při zátěži, je čas jednat.\n\nGPU má podobné limity — do 85 stupňů při plném zatížení je norma. Nad 90 stupňů se grafická karta začíná tepelně omezovat — tzv. thermal throttling — a výkon klesá i o 20 procent.\n\nJak teploty měřit? Stáhněte si HWiNFO64 — je zdarma a ukáže vám přesné teploty všech komponent v reálném čase. Nebo MSI Afterburner s Rivatuner pro zobrazení přímo ve hře přes overlay.\n\nJak teploty snížit? Zaprvé — vyčistěte PC od prachu. Zadruhé — zkontrolujte airflow ve skříni. Vzduch by měl proudit dovnitř přes přední a spodní ventilátory a ven přes zadní a horní.\n\nZatřetí — zvažte výměnu teplovodivé pasty na CPU. Pasta stárne a po třech až čtyřech letech ztrácí účinnost. Výměna trvá 15 minut a může snížit teploty o 10 i více stupňů. Dobrá pasta: Thermal Grizzly Kryonaut nebo Arctic MX-6.", "cta": "Jaké teploty ukazuje váš PC pod zátěží? Napište do komentářů číslo pro CPU i GPU — rád vám řeknu, zda je to v pořádku.", "url": ""}, {"title": "BIOS — jak vstoupit, co nastavit a čeho se nedotýkat", "priority": "p50", "priorityLabel": "50 %", "tags": ["p50", "navod"], "seoUrl": null, "seoLabel": null, "hook": "BIOS. Slovo, které zní hrozivě — ale ve skutečnosti je to jen nastavení, které každý majitel PC by měl alespoň jednou vidět. Dneska vám ukážu, jak vstoupit a co tam najdete.", "body": "BIOS — nebo jeho moderní verze UEFI — je firmware základní desky. Je to první program, který se spustí při zapnutí PC, ještě před Windows. Právě v BIOSu se konfiguruje hardware a bootování systému.\n\nJak vstoupit do BIOSu? Ihned po zapnutí PC mačkejte klávesu Delete, F2 nebo F10 — záleží na výrobci základní desky. Obvykle se zobrazí nápověda přímo na obrazovce při startu.\n\nCo tam najdete? Informace o procesoru, RAM a teplotách. Nastavení Boot Order — pořadí zařízení, ze kterých se PC pokouší nabootovat. A XMP nebo EXPO profil pro RAM — to je klíčové!\n\nPokud jste si koupili RAM 3200 MHz nebo 6000 MHz a v BIOSu nemáte aktivovaný XMP profil, vaše RAM běží jen na základní frekvenci 2133 nebo 4800 MHz. To je velký výkonnostní rozdíl za nulové náklady — stačí v BIOSu najít profil XMP nebo EXPO a zapnout ho.\n\nCo v BIOSu naopak neměnit, pokud nevíte přesně co děláte: napětí CPU, hodnoty taktování a nastavení zabezpečení bootování. Špatná nastavení mohou způsobit, že se PC nepůjde spustit a budete muset resetovat BIOS přes jumper na základní desce.", "cta": "Máte v BIOSu aktivovaný XMP nebo EXPO profil pro RAM? Napište ano nebo ne do komentářů — tipuji, že polovina z vás ne.", "url": ""}, {"title": "Jak zrychlit PC — 5 konkrétních kroků", "priority": "p50", "priorityLabel": "50 %", "tags": ["p50", "navod"], "seoUrl": null, "seoLabel": null, "hook": "PC se zpomaluje časem — to je realita. Ale ve většině případů není potřeba kupovat nový hardware. Stačí vědět, co vyladit. Dám vám pět konkrétních kroků.", "body": "Krok číslo jedna: odinstalujte nepotřebné programy. Přejděte do Nastavení, Aplikace a projděte seznam. Překvapí vás, kolik programů se spouští automaticky a spotřebovává RAM a CPU, aniž byste o tom věděli.\n\nKrok číslo dvě: zakažte programy při startu. Stiskněte Ctrl+Shift+Esc, přejděte na záložku Spuštění a zakažte vše, co nepotřebujete ihned po zapnutí — Spotify, Discord, Adobe updater. Každý ušetřený startup program zrychlí boot o sekundy.\n\nKrok číslo tři: zkontrolujte volné místo na disku. SSD potřebuje alespoň 10 až 15 procent volného místa k efektivnímu fungování. Pokud máte disk plný, výrazně to zpomaluje systém.\n\nKrok číslo čtyři: proveďte Windows Update a aktualizujte ovladače. Zastaralé ovladače — zvláště grafické — mohou způsobovat pády, zaseknutí a pomalý výkon.\n\nKrok číslo pět: zkontrolujte stav disku pomocí nástroje CrystalDiskInfo — ten je zdarma a ukáže vám, zda váš SSD nebo HDD není na pokraji selhání. Poškozený disk je nejčastější příčinou dramatického zpomalení PC a mnohdy ho snadno zaměníme za software problém.", "cta": "Vyzkoušejte dnes CrystalDiskInfo a napište do komentářů, jaké skóre máte na disku. Uvidíme, kdo má opravdu zdravý hardware.", "url": ""}, {"title": "Jak vybrat procesor — CPU pro hráče i tvůrce", "priority": "p50", "priorityLabel": "50 %", "tags": ["p50", "hardware", "výběr"], "seoUrl": null, "seoLabel": null, "hook": "Procesor nebo grafická karta — co je pro hraní důležitější? A jak vybrat CPU, který nebrzdí zbytek sestavy? Dneska to vysvětlím jasně a konkrétně.", "body": "Začněme základní pravdou: pro čistě herní sestavu je grafická karta důležitější než procesor. GPU zpracovává vizuální výpočty a přímo ovlivňuje framerate. CPU ale nesmí brzdět GPU — a to je klíčový pojem: bottleneck.\n\nBottleneck nastane, když procesor nestíhá zásobovat grafickou kartu daty. Výsledkem je, že GPU běží jen na 60 nebo 70 procentech kapacity. Proto je výběr CPU vždy relativní k GPU — musí si sedět.\n\nJaká je dnes dobrá volba? Pro střednědobé herní sestavy je AMD Ryzen 5 7600 nebo 7600X skvělý výběr — šest jader, vysoké takty, moderní platforma AM5 s výhledem minimálně do roku 2027. Intel Core i5-13400F nebo i5-14400F jsou konkurenceschopné alternativy za podobnou cenu.\n\nPro výkonnější sestavy: Ryzen 7 7700X nebo Intel i7-14700KF.\n\nCo sledovat při výběru CPU? Počet jader — pro hry stačí 6 jader, pro multitasking, streaming a tvorbu obsahu je lepší 8 a více. Frekvence jádra — čím vyšší, tím lépe pro hry. Cache — velká L3 cache pomáhá u her citlivých na latenci. Platforma — ujistěte se, že CPU pasuje do základní desky s odpovídajícím soketem.", "cta": "Jaký máte procesor a s čím ho párujete? Napište do komentářů — rád zhodnotím, zda je kombinace optimální nebo zda máte bottleneck.", "url": ""}, {"title": "Upgrade PC — jak zvýšit výkon bez nové sestavy", "priority": "p50", "priorityLabel": "50 %", "tags": ["p50", "hardware", "navod"], "seoUrl": null, "seoLabel": null, "hook": "Máte pocit, že váš PC začíná zaostávat, ale nechcete kupovat celou novou sestavu? Dobrá zpráva — ve většině případů stačí jeden nebo dva upgrady. Dneska si povíme, co přesně.", "body": "Nejdůležitějším upgradem pro většinu starších PC je přidání RAM nebo upgrade na rychlejší RAM. Pokud máte méně než 16 GB, doplnění na 16 nebo 32 GB může výrazně zrychlit multitasking a moderní hry. Pokud máte pomalou DDR4 2400 MHz, upgrade na 3200 nebo 3600 MHz je znatelný bez nutnosti měnit cokoliv jiného.\n\nDruhý nejdůležitější upgrade závisí na vašem hardware. Pokud máte starý HDD jako systémový disk, nahrazení za NVMe SSD je dramatická změna — Windows se nabootuje za 10 sekund místo 90. Pocit z PC se zlepší víc než po výměně GPU.\n\nPokud váš systémový disk je SSD, ale GPU je starší než 4 roky, upgrade grafické karty je nejefektivnější herní upgrade.\n\nTřetím typem upgradu, který se vyplatí, je výměna CPU chladiče. Pokud máte originální Intel nebo AMD boxový chladič, jeho výměna za tower chladič jako Noctua NH-U12S nebo be quiet! Pure Rock 2 sníží teploty o 15 až 20 stupňů a procesor se přestane tepelně omezovat.\n\nPozor na kompatibilitu: RAM musí odpovídat standardu vaší základní desky. GPU potřebuje dostatečný zdroj. CPU upgrade musí být kompatibilní se soketem základní desky.", "cta": "Co u vás jako první potřebuje upgrade — RAM, SSD, GPU nebo CPU chladič? Napište do komentářů a rád doporučím konkrétní produkt.", "url": ""}, {"title": "RGB a design PC — jak to udělat správně", "priority": "p50", "priorityLabel": "50 %", "tags": ["p50", "lifestyle"], "seoUrl": null, "seoLabel": null, "hook": "RGB — milujete ho nebo nenávidíte. Ať tak nebo tak, svítící počítač se stal fenoménem. Dneska vám ukážu, jak udělat herní setup opravdu efektní — a co přitom nezanedbat.", "body": "Začněme tím nejdůležitějším: RGB neovlivňuje výkon počítače. Absolutně nijak. Je to čistě estetická záležitost. A pokud vám světla vadí, není žádný problém koupit výkonné komponenty bez RGB — výrobci jako Noctua nebo be quiet! staví na designovém minimalismu.\n\nAle pokud RGB chcete, tady je, jak na to správně.\n\nZa prvé — ekosystém. Různí výrobci mají různé software pro ovládání RGB: ASUS má Aura Sync, MSI má Mystic Light, Gigabyte má RGB Fusion. Pokud chcete mít vše synchronizované pod jednou aplikací, vybírejte komponenty od stejného výrobce nebo použijte OpenRGB — open-source nástroj kompatibilní s většinou RGB hardwaru.\n\nZa druhé — viditelnost. RGB má smysl jen pokud máte skříň se skleněným bočním panelem. Skříně jako Lian Li PC-O11, Phanteks Eclipse P500A nebo NZXT H510 Flow nabízejí vynikající viditelnost komponent a jsou designovými ikonami.\n\nZa třetí — kabelový management. Krásně nasvícený PC s chaosem kabelů nevypadá dobře. Věnujte čas vedení kabelů za základní deskou a použijte svorky nebo kabelové kanály.", "cta": "Máte RGB setup? Pošlete fotku do komentářů nebo na náš Instagram — rádi ho přesdílíme! Inspiraci na herní setupy najdete na blogu HelloComp.", "url": ""}, {"title": "Cloudové hraní — budoucnost nebo jen hype?", "priority": "p50", "priorityLabel": "50 %", "tags": ["p50", "lifestyle"], "seoUrl": "https://www.hellocomp.cz/cloudove-hrani-budoucnost/", "seoLabel": "hellocomp.cz/cloudove-hrani-budoucnost/", "hook": "Co kdybych vám řekl, že můžete hrát Cyberpunk 2077 v ultra nastaveních na starém notebooku za pět tisíc? Cloudové hraní to umožňuje — ale jsou tu podmínky, o kterých se moc nemluví.", "body": "Cloudové hraní funguje na principu streamování — hra běží na serverech poskytovatele a vy vidíte jen obrazový přenos, podobně jako Netflix. Vaše klávesnice a myš odesílají vstupy, server je zpracuje a pošle vám obraz zpět.\n\nNejvětší hráči na tomto trhu jsou GeForce Now od Nvidie a Xbox Cloud Gaming od Microsoftu, který je součástí Game Passu.\n\nCo jsou výhody? Nepotřebujete silný hardware — stačí slušné internetové připojení. Hry se okamžitě aktualizují a není třeba nic stahovat. Můžete hrát na tabletu, telefonu nebo starém PC.\n\nCo jsou nevýhody? Latence. Input lag — prodleva mezi stiskem klávesy a reakcí ve hře — je v cloudu vždy vyšší než na lokálním hardwaru. Pro esport tituly jako CS2 nebo Valorant je to diskvalifikující. Pro single player hry to většina hráčů tolerance pojme.\n\nA cena: GeForce Now Ultimate vyjde na přibližně 20 dolarů měsíčně. Za rok je to 240 dolarů — za co byste koupili slušnou grafickou kartu. Cloudové hraní je skvělé jako doplněk, ale jako náhrada za vlastní PC má pro aktivní hráče jasné limity.", "cta": "Vyzkoušeli jste cloudové hraní? Napište svůj názor do komentářů — jste pro nebo proti? Článek na HelloComp je v popisu.", "url": "https://www.hellocomp.cz/cloudove-hrani-budoucnost/"}, {"title": "VR Gaming v roce 2025 — stojí to za to?", "priority": "p50", "priorityLabel": "50 %", "tags": ["p50", "lifestyle"], "seoUrl": "https://www.hellocomp.cz/vr-gaming/", "seoLabel": "hellocomp.cz/vr-gaming/", "hook": "VR gaming existuje přes deset let — a přesto to stále vypadá jako technologie budoucnosti. Proč? A co dnes VR nabízí reálně? Dám vám upřímný přehled.", "body": "Virtuální realita v hraní nabízí zážitek, který nic jiného nedokáže replikovat — prostorový pocit přítomnosti ve hře. Když ve VR vystoupíte na okraj propasti, instinktivně se zachytíte. Srdce tluče rychleji. To je síla VR.\n\nAktuálně nejdostupnějším vstupem do VR je Meta Quest 3 — standalone headset, který nevyžaduje PC, ale lze ho k PC připojit pro výkonnější zážitek přes Quest Link nebo Air Link.\n\nPokud máte výkonné PC s RTX 4070 nebo výš, Valve Index nebo Sony PlayStation VR2 s adaptérem pro PC jsou prémiovými volbami s nejlepší kvalitou obrazu.\n\nCo potřebujete pro PC VR? Minimálně RTX 3070 nebo RX 6700 XT, procesor i5 nebo Ryzen 5 aktuální generace, 16 GB RAM a USB 3.0 port. A prostor — ideálně alespoň 2 x 2 metry volné plochy.\n\nJaké hry stojí za to? Half-Life: Alyx je stále technologicky i herně špičková ukázka VR. Beat Saber je nejpřístupnější. Boneworks a Bonelab pro náročné hráče akce.\n\nNevýhody: cena headsetů, fyzická náročnost a omezená herní knihovna oproti klasickým hrám.", "cta": "Máte VR headset nebo přemýšlíte o koupi? Napište do komentářů — rád zodpovím otázky. Přehled VR a požadavků na PC je na HelloComp.", "url": "https://www.hellocomp.cz/vr-gaming/"}, {"title": "Vodní vs vzduchové chlazení — co je skutečně lepší?", "priority": "p50", "priorityLabel": "50 %", "tags": ["p50", "hardware"], "seoUrl": null, "seoLabel": null, "hook": "Vodní chlazení vypadá impozantně — ale je opravdu lepší než vzduchové? Odpověď vás může překvapit. Dneska srovnáme obě kategorie objektivně.", "body": "Vzduchové chlazení je prověřená, spolehlivá a cenově dostupná technologie. Tower cooler jako Noctua NH-D15 nebo be quiet! Dark Rock Pro 4 dokáže ochladit i výkonné procesory třídy Ryzen 9 nebo i9 stejně efektivně jako průměrné vodní chlazení — a to bez jediného pohyblivého dílu kromě ventilátorů.\n\nPokud ventilátor na tower cooleru selže, jednoduše ho vyměníte za pár stovek. Životnost dobrého tower cooleru je 10 a více let bez jakéhokoliv problému.\n\nVodní chlazení — konkrétně AIO uzavřené smyčky — nabízí určité výhody. Pumpa a radiátor jsou odděleně od CPU, takže nad procesorem není masivní věž blokující RAM nebo boční panel. U 360mm radiátoru dostanete o 5 až 10 stupňů nižší teploty než u srovnatelného tower cooleru.\n\nAle: AIO má více bodů selhání. Pumpa může selhat. Hadičky mohou prasknout nebo postupně degradovat. Průměrná životnost AIO je 5 až 7 let.\n\nPro základ a střední segment doporučuji kvalitní tower cooler. Pro high-end sestavy s overclockingem nebo v případě, že záleží na vizuálním dojmu, dává AIO smysl.", "cta": "Co používáte — vzduch nebo vodu? A máte s tím dobrou nebo špatnou zkušenost? Napište do komentářů — zajímá mě to.", "url": ""}, {"title": "Bottleneck — co to je a jak mu předejít", "priority": "p50", "priorityLabel": "50 %", "tags": ["p50", "hardware", "navod"], "seoUrl": null, "seoLabel": null, "hook": "Bottleneck — tohle slovo straší každého, kdo skládá nebo plánuje PC. Ale co to vlastně znamená? A jak zjistíte, zda ho máte? Rozebereme to bez zbytečných keců.", "body": "Bottleneck doslova znamená hrdlo láhve — komponenta, která brzdí zbytek systému. V PC kontextu nejčastěji hovoříme o bottlenecku CPU-GPU. Nastane, když procesor nestíhá zásobovat grafickou kartu daty. GPU pak čeká a běží jen na 60 nebo 70 procentech výkonu.\n\nJak bottleneck poznat? Monitorujte využití CPU a GPU při hře pomocí HWiNFO nebo MSI Afterburner s Rivatuner overlay. Pokud GPU běží na méně než 90 procentech a CPU je na 100 procentech, máte CPU bottleneck. Pokud je GPU na 99 procentech a CPU na 40 procentech, je to správný stav.\n\nNejčastější případ: starý čtyřjádrový Intel i5 ze sedmé nebo osmé generace spárovaný s novou RTX 4070. Tato kombinace může způsobit, že RTX 4070 pracuje jako RTX 4060 — plýtvání výkonem a penězi.\n\nV jakém rozlišení hrajete je také klíčové. Ve vyšším rozlišení je GPU vytíženější a bottleneck CPU je méně znatelný. V 1080p esportu je CPU bottleneck naopak velmi viditelný.\n\nJak bottleneck řešit? Upgrade CPU na modernější generaci, nebo výběr GPU, která lépe odpovídá vašemu procesoru. Pravidlo: nesparujte nový top-tier GPU se starým low-end CPU.", "cta": "Napište do komentářů, jaký CPU a GPU máte — rád vám řeknu, zda máte bottleneck nebo ne. Je to zdarma a rychlé.", "url": ""}, {"title": "Jak vybrat RAM — DDR4 vs DDR5, kapacita, frekvence", "priority": "p25", "priorityLabel": "25 %", "tags": ["p25", "hardware", "výběr"], "seoUrl": null, "seoLabel": null, "hook": "RAM — operační paměť — je jedna z nejčastěji podceňovaných komponent. Přitom výběr špatné RAM může výrazně omezit výkon celé sestavy. Dneska vám ukážu, na co se zaměřit.", "body": "Nejprve: DDR4 nebo DDR5? Pokud stavíte nový PC na platformě AMD AM5 nebo Intel Alder Lake a novější, DDR5 je moderní standard. Pokud máte starší platformu — AMD AM4 nebo Intel 10. nebo 11. generace — jste na DDR4. Tyto dva standardy nejsou vzájemně kompatibilní.\n\nKapacita: pro dnešní hraní je 16 GB minimální standard. 32 GB je doporučená hodnota, zvláště pokud zároveň streamujete nebo používáte PC na tvorbu obsahu. 64 GB a více je pro profesionální pracovní stanice.\n\nFrekvence: pro AMD Ryzen procesory je klíčový Infinity Fabric. Ryzen procesory výkonnostně profitují z frekvencí 6000 MHz DDR5 nebo 3600 MHz DDR4. Intel je obecně méně citlivý na frekvenci RAM, ale rychlejší RAM stále pomáhá.\n\nKonfigurace: dvě paměti ve dual-channel konfiguraci jsou vždy lepší než jedna paměť stejné kapacity. Čtyři sloty na základní desce, dvě obsazené? Vložte je do slotů 2 a 4 — záleží na manuálu základní desky, ale to je nejčastější doporučení.\n\nA nezapomeňte aktivovat XMP nebo EXPO profil v BIOSu — jinak RAM běží na základní frekvenci bez ohledu na to, za co jste zaplatili.", "cta": "Jakou RAM máte a na jakém profilu ji provozujete? Napište do komentářů — tipuji, že XMP nemá každý zapnutý.", "url": ""}, {"title": "Jak vybrat zdroj PC — proč na něm záleží víc než si myslíte", "priority": "p25", "priorityLabel": "25 %", "tags": ["p25", "hardware", "výběr"], "seoUrl": null, "seoLabel": null, "hook": "Zdroj je nejméně sexy součást herního PC. Nikdo si ho nefotí, nikdo se jím nechlubí. A přitom je to komponenta, která může zničit celý zbytek sestavy. Vysvětlím vám proč.", "body": "Zdroj PC, anglicky PSU, převádí střídavé napětí ze zásuvky na stejnosměrné napětí pro komponenty. A právě kvalita tohoto převodu rozhoduje o stabilitě a životnosti vašeho hardware.\n\nLevné zdroje mají nestabilní výstupní napětí — to způsobuje náhodné pády systému, nestabilitu při přetaktování a v nejhorším případě poškození komponent při výpadku napájení.\n\nCo hledat při výběru zdroje? Zaprvé — certifikace 80 Plus. Bronzová je minimum. Zlatá je standard pro herní sestavy. Platinová a Titanová jsou pro maximální efektivitu. Čím vyšší certifikace, tím méně energie se mění v teplo.\n\nZadruhé — wattový výkon s rezervou. Spočítejte TDP všech komponent a přidejte 20 až 30 procent. Moderní GPU třídy RTX 4080 spotřebovává 320 wattů samotná. Kompletní sestava s takovým GPU potřebuje alespoň 850W zdroj.\n\nZatřetí — modulárnost. Modulární nebo semi-modulární zdroje mají odnímatelné kabely — výsledkem je čistší kabelový management ve skříni.\n\nDoporučené značky: Seasonic, be quiet!, Corsair, ASUS ROG Thor. Vyhýbejte se neznámým značkám bez recenzí.", "cta": "Víte, kolik wattů má váš zdroj a od jaké značky je? Napište do komentářů — rád zhodnotím, zda je to dostatečné pro vaši sestavu.", "url": ""}, {"title": "Grafické karty Nvidia RTX 50 série — co přinášejí?", "priority": "p66", "priorityLabel": "66 %", "tags": ["p66", "hardware"], "seoUrl": "https://www.hellocomp.cz/graficke-karty-nvidia-geforce-rtx-50-series/", "seoLabel": "hellocomp.cz/graficke-karty-nvidia-rtx-50-series/", "hook": "Nvidia RTX 50 série je tady — a přináší technologie, které ještě před dvěma lety existovaly jen v laboratořích. Dneska si projdeme, co je nového a zda se vyplatí upgradovat.", "body": "RTX 50 série s kódovým označením Blackwell přináší několik klíčových novinek oproti předchozí generaci RTX 40.\n\nNejvětší je DLSS 4 s Multi Frame Generation. Zatímco DLSS 3 umělo generovat jeden syntetický snímek mezi dvěma reálnými, DLSS 4 generuje až tři syntetické snímky. Výsledkem je dramaticky vyšší číslo frameratu — ale probíhá diskuze o tom, jak moc je takový syntetický framerate reálný co do herního pocitu a latence.\n\nDruhá novinka je Neural Rendering — Nvidia integruje AI přímo do renderovacího pipeline. To umožňuje modely s nižším počtem polygonů doplnit o AI-generované detaily v reálném čase, čímž se sníží nároky na GPU při zachování vysoké vizuální kvality.\n\nVlajková loď RTX 5090 má 32 GB GDDR7 VRAM a TDP přes 600 wattů. To není herní karta pro běžného uživatele — to je pracovní nástroj pro AI vývojáře a 3D profesionály.\n\nPro hráče jsou zajímavější RTX 5070 Ti a RTX 5070 — ty přinášejí výkon srovnatelný s předchozí generací flagshipů za rozumnější cenu.\n\nZda upgradovat z RTX 40 na RTX 50? Pokud máte RTX 4070 nebo výš — pravděpodobně ne. Pokud máte RTX 3070 nebo starší — RTX 5070 je zajímavá volba.", "cta": "Chystáte se upgradovat na RTX 50 sérii? Nebo počkáte? Napište do komentářů svůj plán. Aktuální nabídku RTX karet najdete na HelloComp.", "url": "https://www.hellocomp.cz/graficke-karty-nvidia-geforce-rtx-50-series/"}, {"title": "Výkup elektroniky — jak zpeněžit starý hardware", "priority": "p66", "priorityLabel": "66 %", "tags": ["p66", "lifestyle"], "seoUrl": "https://www.hellocomp.cz/vykup-elektroniky-a-it/", "seoLabel": "hellocomp.cz/vykup-elektroniky-a-it/", "hook": "Leží vám doma staré PC, notebook nebo komponenty, které nepoužíváte? Víte, že za ně můžete dostat slušné peníze — aniž byste museli řešit prodej na bazaru?", "body": "Výkup elektroniky je jednoduchý proces — přivezete nebo pošlete hardware, my ho oceníme a dostanete peníze. Bez inzerátů, bez čekání na kupce, bez rizika, že vás nový majitel podvede.\n\nCo vykupujeme? Herní PC, notebooky, komponenty — procesory, grafické karty, RAM, SSD. Ale také staré telefony, tablety a kancelářské PC.\n\nJak probíhá ocenění? Přijdete nebo nám napíšete s popisem stavu zařízení. My vám dáme nezávaznou nabídku — a vy se rozhodnete, zda ji přijmete. Celý proces je transparentní a bez závazků.\n\nCo ovlivňuje výkupní cenu? Stav hardware — funkčnost, vizuální opotřebení a věk komponent. Aktuální tržní hodnota — ceny použitého hardware se mění. Kompletnost — PC s originálními kabely a krabicemi dostane lépe.\n\nProč prodávat přes výkup a ne na bazaru? Bazar je časově náročný. Musíte fotit, popisovat, dohadovat se s kupci, řešit dopravu a riziko podvodu. U nás máte jistotu a rychlost.\n\nPokud plánujete koupit nový PC a chcete zpeněžit ten starý, výkup je elegantní řešení — dostanete peníze na nový hardware a zbavíte se starého bez starostí.", "cta": "Máte doma nevyužitý hardware? Napište nám nebo přijďte — rádi vám dáme nezávaznou nabídku. Odkaz na výkup je v popisu videa.", "url": "https://www.hellocomp.cz/vykup-elektroniky-a-it/"}, {"title": "Herní notebook nebo stolní PC — jak se rozhodnout?", "priority": "p50", "priorityLabel": "50 %", "tags": ["p50", "výběr", "lifestyle"], "seoUrl": null, "seoLabel": null, "hook": "Herní notebook nebo stolní herní PC? Tato otázka nemá jednu správnou odpověď — záleží na vašem životním stylu. Dneska vám pomůžu se rozhodnout.", "body": "Začneme stolním PC — jeho výhody jsou jasné. Za stejnou cenu dostanete výrazně vyšší výkon. Chlazení je lepší — větší skříň, větší ventilátory, nižší teploty. Upgradovatelnost — za tři roky vyměníte GPU za aktuální generaci.\n\nŽivotnost stolního PC je typicky 5 až 8 let před nutností výraznějšího upgradu. Nevýhoda? Je přibytý na jednom místě. Potřebujete prostor na stole, napájení ze zásuvky a monitor navíc.\n\nHerní notebook je naopak mobilní — vezmete ho k přátelům, na brigádu, do školy nebo na cesty. Má vestavěný displej, klávesnici a baterii.\n\nNevýhody notebooku: za stejný výkon zaplatíte přibližně o 30 až 50 procent více. Tepelné limity jsou přísné — notebook musí chladit výkonné GPU ve velmi úzkém prostoru a thermal throttling je běžnější. Upgradovatelnost je minimální — GPU je zaletovaná na základní desce. A baterie vydrží při hraní typicky 1 až 2 hodiny — herní notebooky jsou v zásadě napájené ze sítě.\n\nPro koho je herní notebook? Pro studenty a lidi, kteří hodně cestují. Pro koho stolní PC? Pro každého, kdo hledá maximální výkon za peníze a nemá potřebu počítač přenášet.", "cta": "Jste notebook nebo stolní PC hráči? A proč jste si vybrali právě to? Napište do komentářů — zajímavá diskuze zaručena.", "url": ""}, {"title": "Jak vybrat herní klávesnici — mechanické vs membránové", "priority": "p50", "priorityLabel": "50 %", "tags": ["p50", "hardware", "výběr"], "seoUrl": null, "seoLabel": null, "hook": "Herní klávesnice — je to marketing nebo skutečný rozdíl? Dneska vám řeknu, co u klávesnice skutečně záleží a co je jen zbytečný příplatek.", "body": "Klíčový rozdíl mezi herní a kancelářskou klávesnicí je v přepínačích — mechanismu, který registruje stisk klávesy. Kancelářské klávesnice obvykle používají membránové přepínače — gumová membrána s jednoduchým kontaktem. Herní klávesnice používají mechanické nebo optické přepínače.\n\nMechanické přepínače jsou charakteristické hmatovou nebo zvukovou zpětnou vazbou. Nejznámější jsou Cherry MX switches — Red pro rychlé lineární stisky bez zpětné vazby, oblíbené u FPS hráčů. Brown pro taktilní zpětnou vazbu bez klikání, ideální pro smíšené použití. Blue pro výrazné klikání — pro ty, kdo si potrpí na zvuk, ale pro okolí méně příjemné.\n\nOptické přepínače registrují stisk světelným paprskem — jsou rychlejší a odolnější než mechanické. Popularizovaly je Razer a SteelSeries.\n\nCo ještě hledat? Anti-ghosting a N-Key Rollover — technologie zajišťující, že každý stisk každé klávesy je registrován, i pokud mačkáte více kláves najednou. To je kritické v herních situacích.\n\nVelikost: fullsize, TKL bez numerické části, nebo 60% a menší. Menší klávesnice dávají více prostoru pro myš — důležité u nízké citlivosti v FPS hrách.\n\nZda je RGB potřebné? Absolutně ne. Světla jsou čistě estetická.", "cta": "Jakou klávesnici používáte a jste s ní spokojeni? Napište do komentářů — rádi se podělím o konkrétní doporučení pro váš styl hraní.", "url": ""}];
var D2=[{"title": "Herní PC do 60 000 Kč — co za ty peníze dostanete", "url": "https://www.hellocomp.cz/herni-pocitac-do-60-000-kc/", "prio": "66", "cats": ["kategorie"], "hook": "Za 60 tisíc si dnes koupíte opravdu výkonný herní počítač. Ale víte, na co si dát pozor, abyste nepřeplatili za zbytečný výkon — nebo naopak nepodcenili budoucnost?", "body": "V kategorii do 60 000 Kč se pohybujeme v segmentu high-end herních počítačů. Dostanete procesory jako Ryzen 7 7700X nebo Intel Core i7-14700K a grafické karty třídy RTX 4070 Ti nebo RX 7900 GRE. To znamená plynné hraní ve 4K rozlišení s ray tracingem zapnutým naplno. Klíčový dotaz, který řešíme u každého sestavení: má smysl jít na 4K, nebo raději zůstat u 1440p a investovat do rychlého monitoru 165 Hz+? Záleží na tom, jaké hry hrajete. Pro e-sportové tituly — Valorant, CS2, Fortnite — je vyšší Hz mnohem důležitější než 4K. Pro RPG a otevřené světy naopak 4K změnu pocítíte okamžitě. V HelloComp každé sestavení testujeme před odesláním — víte přesně, na co sáháte.", "cta": "Přijďte si k nám promluvit o sestavení do 60 tisíc. Poradíme, co má smysl a co je jen hezky vypadající číslo na papíře. Odkaz v biu, nebo nás najdete na hellocomp.cz.", "tags": ["kategorie", "66"]}, {"title": "Výkonné počítače — když herní nestačí a chcete víc", "url": "https://www.hellocomp.cz/vykonne-pocitace/", "prio": "66", "cats": ["kategorie"], "hook": "Co když potřebujete počítač, který zvládne jak hry, tak práci na plný výkon — střih videa ve 4K, 3D modelování a zároveň večerní gaming? Výkonný počítač a herní PC nejsou vždy totéž.", "body": "Výkonný počítač se od čistě herního liší hlavně výběrem komponent. Potřebujete více RAM — ideálně 32 nebo 64 GB pro kreativní práci. Procesor by měl mít hodně jader: AMD Ryzen 9 nebo Intel Core i9 zvládnou bez přehřátí renderovat a současně hrát. Grafická karta musí být dostatečně silná pro obě disciplíny — RTX 4080 nebo 4090 se postará o akceleraci v Adobe Premier i o plynné hraní Cyberpunka. Důležitá jsou i rychlá NVMe SSD úložiště — čekání na načtení projektu je stejně frustrující jako pády FPS. V HelloComp tato sestavení navrhujeme přímo na míru podle toho, co skutečně děláte — ne podle katalogového listu.", "cta": "Pokud si nejste jisti, jestli potřebujete herní nebo výkonný PC, napište nám nebo přijďte osobně. Uložíme vás od špatné investice.", "tags": ["kategorie", "66"]}, {"title": "Custom herní PC na míru — proč se vyplatí víc než hotová sestava", "url": "https://hellocomp.cz/custom-herni-pocitac-na-miru/", "prio": "33", "cats": ["kategorie"], "hook": "Víte, proč většina lidí po roce lituje hotové sestavy z e-shopu? Protože ji nepřizpůsobili svým potřebám — a teď mají procesor, co přebývá, a GPU, co nestačí.", "body": "Custom herní PC na míru znamená, že každou komponentu volíme podle toho, co hrajete, jak dlouho chcete PC používat a jaký máte rozpočet. Není žádný důvod platit za 32 GB RAM, když hrajete CS2. Stejně tak nemá smysl šetřit na grafické kartě, pokud chcete hrát AAA tituly v 1440p. V HelloComp projdeme s vámi tři základní otázky: jaké hry, jaké rozlišení, jaký budget. Z toho složíme sestavu, která má smysl — bez zbytečného přeplácení, ale taky bez kompromisů na špatném místě. A každý custom PC u nás projde testem před odesláním. Žádné překvapení po rozbalení.", "cta": "Chcete custom PC přesně pro vás? Pošlete nám zprávu nebo přijďte. Sestavíme vám návrh — zdarma a bez závazků.", "tags": ["kategorie", "33"]}, {"title": "Herní PC na splátky — je to rozumné řešení?", "url": "https://www.hellocomp.cz/herni-pocitace-na-splatky/", "prio": "33", "cats": ["kategorie"], "hook": "Herní PC chcete hned, ale nemáte teď celou částku najednou. Splátky mohou být rozumné řešení — ale záleží na podmínkách. Co si hlídat, aby vás to nevyšlo draho?", "body": "Splátky u elektroniky mají jednu zásadní výhodu: dostanete počítač teď, když ho potřebujete — ne za půl roku, až naspoříte. Ale vždy sledujte RPSN — roční procentuální sazbu nákladů. Nulové úrokové akce bývají opravdu výhodné, pokud splátky stihnete. Naopak, pokud máte u poskytovatele vyšší RPSN, zaplatíte za PC více, než je jeho cena. V HelloComp nabízíme možnost splátkového financování pro herní sestavy od 15 000 Kč výše. Vždy vám ukážeme celkovou cenu, abyste věděli, co platíte. Žádné skryté poplatky, žádná překvapení na výpisu.", "cta": "Chcete zjistit, jaké splátky vycházejí pro vaši sestavu? Napište nám nebo se podívejte na hellocomp.cz — tam najdete aktuální podmínky.", "tags": ["kategorie", "33"]}, {"title": "Kancelářský PC — na co se zaměřit, když nepotřebujete herní výkon", "url": "https://www.hellocomp.cz/kancelarske-pocitace/", "prio": "33", "cats": ["kategorie"], "hook": "Pro práci z domu nebo kanceláře nepotřebujete herní obr. Ale levný a pomalý PC vás bude stát čas každý den. Kde je rozumná hranice?", "body": "Kancelářský počítač musí zvládat tři základní věci spolehlivě: prohlížeč s deseti záložkami, Teams nebo Zoom a práci v Officeu. To neznamená, že musí být pomalý — ale nemusí mít ani RTX grafiku. Pro drtivou většinu kancelářské práce bohatě stačí procesor Ryzen 5 nebo Intel Core i5, 16 GB RAM a rychlý SSD. Ten je klíčový — rozdíl mezi počítačem s HDD a SSD poznáte okamžitě při zapínání a přepínání aplikací. V HelloComp sestavujeme kancelářské PC, která jsou spolehlivá a tichá — protože hlučný počítač v kanceláři přímo trápí při videocallu. Klademe důraz na nízkou spotřebu a dlouhou životnost.", "cta": "Hledáte spolehlivý pracovní PC bez zbytečného přeplácení? Podívejte se na hellocomp.cz nebo napište — poradíme co přesně potřebujete.", "tags": ["kategorie", "33"]}, {"title": "Počítač pro grafika — proč se nestačí podívat jen na GPU", "url": "https://www.hellocomp.cz/pocitace-pro-grafiky/", "prio": "33", "cats": ["kategorie"], "hook": "Spousta grafiků si koupí PC se silnou grafickou kartou a pak se diví, proč Photoshop nebo Illustrator stále lagují. Chyba není v GPU — je jinde.", "body": "Pro grafické práce — Photoshop, Illustrator, After Effects, Lightroom — je nejdůležitější kombinace RAM a rychlého úložiště. Procesor musí mít dostatek jader pro vícevláknové renderování, ale grafická karta hraje různou roli podle softwaru. Adobe produkty využívají GPU pro akceleraci, ale záleží na konkrétní aplikaci. Co každý grafik potřebuje jistě: 32 GB RAM jako základ, nejlépe 64 GB pro náročné projekty, rychlý NVMe SSD na projekty a druhý disk na zálohy, a kalibrovaný monitor s přesným podáním barev — to je investice, která se vyplatí. V HelloComp sestavujeme pracovní stanice pro grafiky i na základě konkrétního softwaru, se kterým pracujete.", "cta": "Pracujete v grafice a chcete PC, který vás nebude brzdit? Napište nám jaký software používáte — sestavíme přesně to, co potřebujete.", "tags": ["kategorie", "33"]}, {"title": "PC na střih videa — co opravdu ovlivní rychlost renderování", "url": "https://www.hellocomp.cz/pocitace-na-strih-videa/", "prio": "33", "cats": ["kategorie"], "hook": "Renderujete hodinu a čekáte hodinu? Není to osud — je to špatná sestava. Tady jsou tři věci, které reálně zkrátí čas renderování na zlomek.", "body": "Střih videa je jednou z nejvíce náročných disciplín na hardware. Tři klíčové faktory: za prvé, procesor — čím více jader, tím lépe. AMD Ryzen 9 7950X nebo Intel Core i9-14900K jsou špičkou pro střih. Za druhé, RAM — pro 4K střih potřebujete minimálně 32 GB, lépe 64 GB. Za třetí, GPU akcelerace — Premiere Pro a DaVinci Resolve využívají GPU kartu pro renderování; RTX 4070 nebo výše výrazně zkrátí export. A nezapomeňte na úložiště: NVMe SSD s rychlostí 5 GB/s plus je jiný svět oproti klasickému SSD. V HelloComp sestavujeme střižny pro Youtubeiry, filmové tvůrce i firemní videoprodukce.", "cta": "Chcete PC, který zvládne 4K střih bez čekání? Poradíme vám konkrétní sestavu podle vašeho rozpočtu. Odkaz v biu.", "tags": ["kategorie", "33"]}, {"title": "PC pro CAD — co potřebuje konstruktér a architekt", "url": "https://www.hellocomp.cz/pocitace-pro-cad/", "prio": "33", "cats": ["kategorie"], "hook": "CAD programy jako AutoCAD, SolidWorks nebo Revit mají specifické nároky na hardware, které se liší od herních PC. Investice do špatné sestavy vás bude stát produktivitu každý den.", "body": "Pro CAD práci jsou klíčové tři věci: stabilní výkon procesoru, dostatek RAM a profesionální grafická karta. CAD software často pracuje více se single-core výkonem procesoru než s počtem jader — proto Intel Core i7 nebo i9 s vysokými taktovacími frekvencemi tu funguje výborně. RAM: minimum 32 GB, pro větší sestavy v Revit nebo komplexní modely v SolidWorks ideálně 64 GB. Grafická karta: herní GPU fungují, ale profesionální karty Nvidia Quadro nebo AMD Radeon Pro mají certifikaci pro CAD software a stabilnější ovladače. To může rozhodnout při práci na kritickém projektu. V HelloComp sestavujeme pracovní stanice pro architekty, konstruktéry i strojní inženýry.", "cta": "Pracujete s CAD softwarem a chcete sestavu, která to zvládne bez kompromisů? Napište nám — poradíme přesně pro váš software.", "tags": ["kategorie", "33"]}, {"title": "Nejnáročnější hry 2025 — jak zjistit, jestli na ně váš PC stačí", "url": "https://www.hellocomp.cz/hry-nejnarocnejsi-a-vyber-pc/", "prio": "100", "cats": ["hry"], "hook": "Spustíte nový titul, nastavíte ultra detaily — a FPS padají pod 30. Jak zjistit, jestli problém je v GPU, RAM nebo procesoru, než investujete do nové komponenty?", "body": "Nejnáročnější hry roku 2025 — Alan Wake 2, Star Wars Outlaws, Black Myth: Wukong nebo Indiana Jones — kladou velké nároky hlavně na grafickou kartu a RAM. Ale diagnóza je důležitá: pokud máte vytíženou GPU na 99 % a CPU pod 60 %, váš procesor nestačí, ne grafika. Pokud je to naopak, GPU je úzké místo. Pro nejnáročnější tituly v 1440p nebo 4K dnes potřebujete minimálně RTX 4070 nebo RX 7800 XT. Důležité je také nastavit XMP profil v BIOSu — spousta lidí má RAM, co běží na poloviční rychlosti, a neví o tom. Tuhle chybu vidíme v servisu opakovaně. V HelloComp při sestavování každého PC rovnou kontrolujeme, jestli je XMP/EXPO profil správně nastaven.", "cta": "Chcete vědět, jestli váš PC zvládne nejnovější tituly, nebo potřebujete upgrade? Napište nám — podíváme se na váš benchmark a poradíme.", "tags": ["hry", "100"]}, {"title": "Nenáročné hry a PC do 20 000 Kč — skvělá kombinace pro začátečníky", "url": "https://www.hellocomp.cz/hry-nenarocne-a-vyber-pc-do-20000/", "prio": "100", "cats": ["hry", "kategorie"], "hook": "Chcete začít hrát hry na PC, ale nechcete utrácet majlant? Dobrá zpráva: pro většinu populárních titulů nepotřebujete top sestavu. Tady je co koupit a proč to stačí.", "body": "Nenáročné hry — Minecraft, Stardew Valley, Among Us, Rocket League, staré díly Call of Duty nebo indie tituly — běží skvěle i na PC do 20 000 Kč. Co opravdu potřebujete: procesor Ryzen 5 nebo Intel Core i5, 16 GB RAM, a grafická karta GTX 1660 Super nebo RX 6600 XT postačí pro 1080p hraní těchto titulů na ultra detaily. Klíčové je, abyste nepodcenili SSD — herní zážitek s HDD je frustrující i u nenáročných her kvůli pomalému načítání. V HelloComp sestavy do 20 tisíc optimalizujeme tak, aby měly smysl a vydržely aspoň 3–4 roky bez upgradu.", "cta": "Chcete vstoupit do PC gamingu bez zbytečně velké investice? Podívejte se na naše sestavy do 20 000 Kč na hellocomp.cz — nebo se zeptejte, co pro vás má smysl.", "tags": ["hry", "kategorie", "100"]}, {"title": "Chlazení PC a teploty — kdy se bát a kdy je všechno v pořádku", "url": "https://www.hellocomp.cz/chlazeni-a-teploty-pc/", "prio": "50", "cats": ["navod", "hw"], "hook": "Váš PC při hraní dosahuje 85 stupňů — je to problém? A co 95 stupňů na procesoru? Teploty jsou nejčastější otázka v servisu. Tady jsou čísla, na která se skutečně dívat.", "body": "Bezpečné teploty se liší podle komponentů. Procesory Intel a AMD jsou navrženy na bezpečný provoz do 90–100 °C, ale dlouhodobě chcete být pod 80 °C při zátěži. Grafické karty Nvidia mají teplotní limit kolem 83–88 °C — pokud na něj narážíte opakovaně, přemýšlejte o zlepšení proudění vzduchu v skříni. Na co se zaměřit: správné usazení CPU chladiče s tepelnou pastou, dostatečný airflow ve skříni — ideálně více přívod vzduchu zepředu než odtah vzadu, čistota PC od prachu alespoň jednou za půl roku. Nejčastější chyba, kterou vidíme: plná skříň prachu a fabriková tepelná pasta stará tři roky. Výsledek? Zbytečný throttling a nižší výkon.", "cta": "Máte obavy z teplot svého PC, nebo ho chcete správně vyčistit a servisovat? Přijďte do HelloComp — prohlídka je rychlá a řekneme vám pravdu.", "tags": ["navod", "hw", "50"]}, {"title": "BIOS — jak vstoupit, co tam najdete a co raději nenastavovat", "url": "https://www.hellocomp.cz/bios-jak-spustit-nastaveni-a-sprava/", "prio": "50", "cats": ["navod"], "hook": "BIOS zní děsivě, ale je to jen nastavení, které se spustí ještě před Windows. A jedna věc, která vám tam může výrazně zlepšit výkon, trvá nastavit třicet vteřin.", "body": "Do BIOSu se dostanete při spuštění PC stisknutím klávesy — nejčastěji Delete, F2 nebo F10 podle výrobce základní desky. Hned na začátku zkontrolujte dvě věci: pořadí bootování — první by měl být váš systémový SSD disk, ne USB nebo DVD. A za druhé, XMP nebo EXPO profil pro RAM. Pokud ho nemáte zapnutý, vaše paměti pravděpodobně běží na 2133 MHz místo deklarovaných 3200 nebo 5600 MHz. To je obrovský výkonnostní rozdíl, který nepoznáte nikde jinde než tady. Ostatní nastavení — jako přetaktování CPU nebo voltáže — nechte na zkušených, pokud nevíte přesně co děláte.", "cta": "Nevíte si rady s BIOSem nebo chcete správně nastavit XMP profil? Napište nám nebo přijďte — nastavíme to za vás a nic nerozbijeme.", "tags": ["navod", "50"]}, {"title": "Zrychlení PC a optimalizace Windows — co reálně funguje", "url": "https://www.hellocomp.cz/zrychleni-pc-a-optimalizace/", "prio": "50", "cats": ["navod"], "hook": "YouTube je plný videí o zrychlení PC pomocí záhadných tweaků v registrech a vypnutí 37 služeb. Víte co z toho reálně funguje? Skoro nic. Tady jsou tři věci, které skutečně pomáhají.", "body": "Tři ověřené způsoby jak zrychlit PC: Za prvé, přeinstalujte Windows čistě — bloatware a nahromaděné soubory za roky používání zpomalují systém víc než cokoliv jiného. Za druhé, zkontrolujte startup v Task Manageru — Ctrl+Shift+Esc, záložka Startup. Vypněte vše, co se spouští automaticky a nepotřebujete. To přímo zkrátí čas bootování. Za třetí, pokud stále máte HDD jako systémový disk, upgrade na SSD je nejlevnější a nejrazantnější zrychlení, které pro PC uděláte. Zvyšování výkonu pomocí registry tweaků nebo softwaru jako GameBooster jsou vesměs placebo. Počítač nespeed-boost, opravte ho správně.", "cta": "Váš PC je pomalý a nevíte proč? Přijďte na diagnostiku do HelloComp — zjistíme přesnou příčinu a navrhneme rozumné řešení.", "tags": ["navod", "50"]}, {"title": "Jak vybrat procesor — AMD nebo Intel a na co se dívat", "url": "https://www.hellocomp.cz/jak-vybrat-procesor/", "prio": "50", "cats": ["hw"], "hook": "AMD nebo Intel? Tato otázka rozděluje herní komunitu více než cokoliv jiného. Pravda je, že odpověď závisí na tom, k čemu PC budete používat — a teď je to zajímavější než kdy dřív.", "body": "Pro herní počítač v roce 2025 jsou nejlepší procesory v poměru cena/výkon: AMD Ryzen 5 7600X a Ryzen 7 7700X pro střední třídu, Intel Core i5-14600K a i7-14700K jako přímá konkurence. AMD má výhodu v energetické účinnosti a multi-core výkonu. Intel tradičně vede v single-core výkonu, důležitém pro hry. Co sledovat při výběru: TDP — spotřeba ovlivní chlazení, podpora paměti DDR4 vs DDR5, kompatibilita s paticí a základní deskou. Nový procesor neznamená nutně nová základní deska — ale někdy ano. V HelloComp vždy kontrolujeme kompatibilitu celé sestavy před objednáním.", "cta": "Vybíráte procesor a nevíte, do čeho jít? Napište nám svůj use-case a budget — doporučíme konkrétní model s odůvodněním.", "tags": ["hw", "50"]}, {"title": "Upgrade PC — co upgradovat jako první a co nemá smysl", "url": "https://www.hellocomp.cz/upgrade-pc/", "prio": "50", "cats": ["navod", "hw"], "hook": "Váš PC se zpomalil a přemýšlíte, co upgradovat. Nový procesor? GPU? Více RAM? Špatná volba tu může znamenat zbytečně utracené peníze bez reálného efektu.", "body": "Jak postupovat při upgradu: Nejdřív zjistěte, kde je úzké místo. Spusťte náročnější hru a sledujte v MSI Afterburner nebo Task Manageru, co je na 100 % — CPU nebo GPU. Pokud je to GPU, nová grafická karta bude mít největší efekt. Pokud CPU, možná stačí lepší chlazení nebo OC RAM. Pokud máte stále méně než 16 GB RAM nebo HDD jako hlavní disk — to jsou nejlevnější upgrady s nejvyšším efektem. Nezapomínejte na kompatibilitu: nová grafická karta potřebuje dostatečný zdroj PC, nový procesor může vyžadovat novou základní desku. V HelloComp nabízíme upgrade konzultace — přijdete s aktuální sestavou, odejdete s plánem.", "cta": "Chcete upgradovat PC, ale nevíte kde začít? Přijďte do HelloComp — diagnostikujeme sestavu a navrhneme smysluplný postup.", "tags": ["navod", "hw", "50"]}, {"title": "RGB a design počítače — jak na to správně a bez zbytečných výdajů", "url": "https://www.hellocomp.cz/rgb-design-pocitace/", "prio": "50", "cats": ["hw"], "hook": "RGB světla na PC — zbytečný luxus nebo součást setup identity? Než to zavrhnete nebo naopak přeinvestujete do svetelné show, tady je co skutečně stojí za to.", "body": "RGB má jednu praktickou nevýhodu: management softwaru. Každý výrobce — Corsair, ASUS Aura, MSI Mystic Light, Gigabyte Fusion — má vlastní aplikaci. Pokud máte různé značky, synchronizace je bolest. Tip: vyberte jednu značku napříč komponentami, nebo použijte OpenRGB jako univerzální řešení. Co reálně ovlivňuje vzhled setup: tempered glass skříň, RGB ventilátory a RAM pásky. Procesorový chladič se světlem je hezký bonus. Kabely jsou skvělý detail — sleeved kabely nebo cable management výrazně změní celkový dojem, a to bez připlácení za efektní komponenty. Světlo nepřidá výkon, ale dobrý setup motivuje. Jen ať to neslouží jako náhrada za výkon.", "cta": "Stavíte nebo upgradujete setup a chcete, aby vypadal skvěle? Poradíme vám, co koupit za rozumné peníze. Napište nám nebo navštivte hellocomp.cz.", "tags": ["hw", "50"]}, {"title": "Jak vybrat klávesnici — herní vs kancelářská, mechanická vs membránová", "url": "https://www.hellocomp.cz/jak-vybrat-klavesnici/", "prio": "50", "cats": ["hw"], "hook": "Klávesnice je věc, které se každý den dotknete miliardkrát. Přesto ji lidé vybírají naposledy a za nejméně peněz. Jedna špatná volba znamená roky nelibého psaní.", "body": "Základní volba: mechanická nebo membránová. Membránové klávesnice jsou tiché a levnější — dobré pro kanceláře. Mechanické mají přesnější aktivaci, delší životnost a výraznější zpětnou vazbu — skvělé pro gaming i pro typisty. Typy přepínačů: červené switche jsou tiché a lehké — oblíbené u hráčů, modré jsou hlasité s taktilní zpětnou vazbou — milují je pisatelé, hnědé jsou kompromis. Pro herní klávesnici hledejte: anti-ghosting nebo n-key rollover pro spolehlivé zaznamenání všech současných úhozů, odolnou konstrukci a pokud možno odnímatelný kabel. Velikost: full size s numpadmem, TKL bez numpadu pro více místa na myš, nebo kompaktní 60/65 %.", "cta": "Hledáte klávesnici do gamingového setup nebo na práci? Poradíme vám konkrétní model podle vašich potřeb a rozpočtu.", "tags": ["hw", "50"]}, {"title": "Jak vybrat zdroj PC — proč šetřit na PSU je špatný nápad", "url": "https://www.hellocomp.cz/jak-vybrat-zdroj/", "prio": "50", "cats": ["hw"], "hook": "Zdroj je komponenta, na které se nejčastěji šetří — a přitom to je ta, která může spálit všechno ostatní. Tady je jak vybrat správně a co nikdy nekupovat.", "body": "Dvě klíčová kritéria: výkon v wattech a certifikace 80 Plus. Pro herní PC s RTX 4070 a Ryzen 7 potřebujete minimálně 650 W, pro RTX 4090 sestavy 850–1000 W. Vždy kupujte s rezervou 20–30 % nad aktuální spotřebou — to prodlužuje životnost a snižuje hluk. Certifikace 80 Plus Gold nebo Platinum znamená vyšší účinnost — méně tepla, nižší účty za elektřinu a spolehlivější provoz. Co nikdy nekupovat: neznačkové zdroje bez certifikace za neuvěřitelně nízkou cenu. Levný zdroj může způsobit nestabilitu celého systému, nebo v nejhorším případě způsobit požár. V HelloComp používáme výhradně zdroje od prověřených výrobců — Corsair, be quiet!, Seasonic — s minimálně 80 Plus Gold certifikací.", "cta": "Nevíte jaký zdroj zvolit pro vaši sestavu? Napište nám složení PC — spočítáme spotřebu a doporučíme správný model.", "tags": ["hw", "50"]}, {"title": "Snímek a nahrávání obrazovky na PC — nejlepší způsoby v 2025", "url": "https://www.hellocomp.cz/snimek-a-nahravani-obrazovky-pc/", "prio": "50", "cats": ["navod"], "hook": "Chcete pořídit screenshot nebo nahrávat gameplay bez toho, aby vám to vzalo výkon? Windows, NVIDIA a AMD mají každý svůj způsob — a jeden z nich je výrazně lepší než ostatní.", "body": "Pro screenshot: nejrychlejší je Win+Shift+S pro výběr oblasti, nebo Print Screen pro celou obrazovku uloženou do schránky. Pro hraní: Nvidia ShadowPlay — NVIDIA Overlay, Alt+Z — nahrává na GPU a nevytěžuje CPU. Pro AMD karty je to AMD ReLive s podobnou funkcí. Xbox Game Bar ve Windows 11 funguje na všech sestavách a je dostatečný pro základní nahrávání. Pro streamy nebo kvalitní záznamy doporučujeme OBS Studio — zdarma, flexibilní nastavení bitrate a enkodéru. Klíč je nastavit NVENC nebo AMF hardwarový enkodér v OBS, ne softwarový CPU enkodér — to výrazně snižuje zátěž.", "cta": "Chcete nahrávat gameplay nebo stream a nevíte jak nastavit OBS? Napište nám — nebo se podívejte na naše návody na hellocomp.cz.", "tags": ["navod", "50"]}, {"title": "Herní atlas žánrů — jaký PC potřebujete na různé typy her", "url": "https://www.hellocomp.cz/hry-atlas-zanru/", "prio": "50", "cats": ["hry"], "hook": "FPS, RPG, strategie, simulátor — každý žánr má jiné nároky na hardware. Herní PC do 20 tisíc zvládne Minecraft, ale na Microsoft Flight Simulator za stejné peníze přijdete zkrátka.", "body": "Tady je přehled nároků podle žánru: E-sport FPS — Valorant, CS2, Fortnite — relativně nenáročné, důležité je ale 144+ Hz monitor a nízká latence. AAA open world — Cyberpunk 2077, Starfield, Ghost of Tsushima — náročné na GPU, ideálně RTX 4070 a výš pro 1440p. Strategie — Civilization, Total War — hodně závisí na CPU, velké mapy kladou nároky na počet jader. Simulátory — Flight Simulator, BeamNG.drive — extrémní nároky na CPU a RAM, Flight Sim v podstatě nemá dno. Indie a starší tituly — nenáročné, zvládne skoro cokoliv. Podle toho, co hrajete, dokážeme v HelloComp sestavit přesně cílený počítač — ne generický herní stroj.", "cta": "Řekněte nám, jaké hry hrajete — a my vám řekneme, co přesně potřebujete. Kontakt na hellocomp.cz nebo v biu.", "tags": ["hry", "50"]}, {"title": "Hry zdarma pro PC — kde je najít a co skutečně stojí za to hrát", "url": "https://www.hellocomp.cz/hry-tipy-na-hry-zdarma/", "prio": "50", "cats": ["hry"], "hook": "Free-to-play hry mají špatnou pověst — pay-to-win a grind bez konce. Ale jsou výjimky, které jsou opravdu skvělé a zdarma. Tady jsou ty nejlepší.", "body": "Na Steamu najdete v sekci Free-to-Play řadu skutečně kvalitních titulů. Dota 2 — komplexní MOBA s obrovskou komunitou. Path of Exile — hloubkové action RPG s dekádou obsahu. Warframe — kooperativní sci-fi akce s pravidelným updatem. Genshin Impact — vizuálně nádherné RPG s volbou neplatit. Epic Games Store každý týden nabízí hry zdarma — stojí za to si vytvořit účet a sledovat. Také GOG, Humble Bundle a Prime Gaming nabízejí hry zdarma pro odběratele. Pro hry zdarma nemusíte mít výkonný PC — většina z nich cílí na co nejširší základnu hráčů.", "cta": "Hledáte vstupní bod do PC gamingu bez velké investice? Podívejte se na naše sestavy do 20 000 Kč — zvládnou drtivou většinu populárních free-to-play titulů.", "tags": ["hry", "50"]}, {"title": "Aktualizace ovladačů grafické karty — jak na to a jak předejít problémům", "url": "https://www.hellocomp.cz/aktualizace-ovladacu-graficke-karty/", "prio": "50", "cats": ["navod", "hw"], "hook": "Aktualizovat ovladače GPU je správný zvyk — ale špatně provedená aktualizace může způsobit víc problémů než vyřeší. Jeden nástroj vám usnadní celý proces.", "body": "Proč aktualizovat ovladače GPU: nové tituly dostávají optimalizované ovladače, opravují se chyby a zlepšuje se výkon. Jak na to správně: použijte DDU — Display Driver Uninstaller — pro čistou reinstalaci. Stáhněte ho z Guru3D, spusťte v Safe Mode a odstraňte staré ovladače. Pak nainstalujte nejnovější verzi z webu Nvidia nebo AMD. Alternativně: Nvidia GeForce Experience a AMD Radeon Software notifikuje automaticky. Ale pozor — ne vždy se vyplatí ihned skočit na nejnovější verzi. Pokud vám aktuální sestava funguje perfektně, počkejte pár dní po vydání, jestli se nevyskytnou problémy u jiných uživatelů. Komunity na Reddit r/nvidia a r/AMDHelp rychle upozorní na problematické verze.", "cta": "Máte problémy s ovladači GPU nebo nevíte jak správně provést reinstalaci? Napište nám — pomůžeme vám projít procesem.", "tags": ["navod", "hw", "50"]}];
var F={1:'all',2:'all'};

function show(n){
  [1,2].forEach(function(i){
    document.getElementById('t'+i).className='tab'+(i===n?' on':'');
    document.getElementById('p'+i).className='pane'+(i===n?' on':'');
    document.getElementById('b'+i).style.display=i===n?'':'none';
  });
}

function tog(h){
  h.nextElementSibling.classList.toggle('on');
  h.querySelector('.cv').classList.toggle('on');
}

function cp(btn,n,i){
  var s=(n===1?D1:D2)[i];
  var t='\u{1F3AC} HOOK:\n'+s.hook+'\n\n\u{1F4D6} OBSAH:\n'+s.body+'\n\n\u{1F4E3} CTA:\n'+s.cta;
  navigator.clipboard.writeText(t).then(function(){
    btn.textContent='\u2713 Zkop\xedrov\xe1no';
    btn.classList.add('ok');
    setTimeout(function(){btn.textContent='Kop\xedrovat sc\xe9n\xe1\u0159';btn.classList.remove('ok');},2000);
  });
}

function flt(n,f,el){
  F[n]=f;
  document.getElementById('b'+n).querySelectorAll('button').forEach(function(b){b.classList.remove('on');});
  el.classList.add('on');
  recount(n);
}

function recount(n){
  var cards=document.querySelectorAll('#g'+n+' .card');
  var k=0;
  cards.forEach(function(c){
    var show=F[n]==='all'||c.dataset.t.split(',').indexOf(F[n])>-1;
    c.style.display=show?'':'none';
    if(show)k++;
  });
  document.getElementById('rc'+n).textContent=k+' sc\xe9n\xe1\u0159\u016f';
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

var TC={
  p100:'a',p66:'b',p50:'c',p33:'d',
  budget:'e',guide:'e',hardware:'e',gaming:'e',lifestyle:'e',
  hry:'e',hw:'e',kategorie:'e',navod:'e',
  '100':'a','66':'b','50':'c','33':'d'
};
var TL={
  p100:'100\u00a0%',p66:'66\u00a0%',p50:'50\u00a0%',p33:'33\u00a0%',
  budget:'Cenov\xe1 sestava',guide:'N\xe1vod',hardware:'Hardware',
  gaming:'Gaming',lifestyle:'Lifestyle',
  hry:'Hry',hw:'Hardware',kategorie:'Kategorie PC',navod:'N\xe1vod',
  '100':'100\u00a0%','66':'66\u00a0%','50':'50\u00a0%','33':'33\u00a0%'
};

function card(s,i,n){
  var tags=s.tags||[];
  var url=s.url||'';
  var tgsH=tags.map(function(t){return '<span class="tg '+(TC[t]||'e')+'">'+(TL[t]||t)+'</span>';}).join('');
  var chars=(s.hook||'').length+(s.body||'').length+(s.cta||'').length;
  return '<div class="card" data-t="'+tags.join(',')+'">'
    +'<div class="ch" onclick="tog(this)">'
    +'<div class="cn">'+String(i+1).padStart(2,'0')+'</div>'
    +'<div class="cm"><div class="ct">'+esc(s.title)+'</div><div class="tgs">'+tgsH+'</div></div>'
    +'<svg class="cv" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>'
    +'</div>'
    +'<div class="cb">'
    +(url?'<div class="ur">&#128279; <a href="'+esc(url)+'" target="_blank">'+esc(url)+'</a></div>':'')
    +'<div class="sc"><div class="sl h">&#9654; Hook</div><div class="st">'+esc(s.hook||'')+'</div></div>'
    +'<div class="sc"><div class="sl o">&#128214; Obsah</div><div class="st">'+esc(s.body||'')+'</div></div>'
    +'<div class="sc"><div class="sl k">&#128227; CTA</div><div class="st">'+esc(s.cta||'')+'</div></div>'
    +'<div class="cz">'+chars+' znak\u016f</div>'
    +'<button class="cp" onclick="cp(this,'+n+','+i+')">Kop\xedrovat sc\xe9n\xe1\u0159</button>'
    +'</div></div>';
}

function init(){
  document.getElementById('g1').innerHTML=D1.map(function(s,i){return card(s,i,1);}).join('');
  document.getElementById('g2').innerHTML=D2.map(function(s,i){return card(s,i,2);}).join('');
  document.getElementById('rc1').textContent=D1.length+' sc\xe9n\xe1\u0159\u016f';
  document.getElementById('rc2').textContent=D2.length+' sc\xe9n\xe1\u0159\u016f';
}
init();
</script>
