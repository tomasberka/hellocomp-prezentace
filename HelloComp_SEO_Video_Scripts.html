{
  title: "BIOS — jak vstoupit, co nastavit a čeho se nedotýkat",
  priority: "p50", priorityLabel: "50 %",
  tags: ["p50","navod"],
  seoUrl: null, seoLabel: null,
  hook: "BIOS. Slovo, které zní hrozivě — ale ve skutečnosti je to jen nastavení, které každý majitel PC by měl alespoň jednou vidět. Dneska vám ukážu, jak vstoupit a co tam najdete.",
  body: `BIOS — nebo jeho moderní verze UEFI — je firmware základní desky. Je to první program, který se spustí při zapnutí PC, ještě před Windows. Právě v BIOSu se konfiguruje hardware a bootování systému.

Jak vstoupit do BIOSu? Ihned po zapnutí PC mačkejte klávesu Delete, F2 nebo F10 — záleží na výrobci základní desky. Obvykle se zobrazí nápověda přímo na obrazovce při startu.

Co tam najdete? Informace o procesoru, RAM a teplotách. Nastavení Boot Order — pořadí zařízení, ze kterých se PC pokouší nabootovat. A XMP nebo EXPO profil pro RAM — to je klíčové!

Pokud jste si koupili RAM 3200 MHz nebo 6000 MHz a v BIOSu nemáte aktivovaný XMP profil, vaše RAM běží jen na základní frekvenci 2133 nebo 4800 MHz. To je velký výkonnostní rozdíl za nulové náklady — stačí v BIOSu najít profil XMP nebo EXPO a zapnout ho.

Co v BIOSu naopak neměnit, pokud nevíte přesně co děláte: napětí CPU, hodnoty taktování a nastavení zabezpečení bootování. Špatná nastavení mohou způsobit, že se PC nepůjde spustit a budete muset resetovat BIOS přes jumper na základní desce.`,
  cta: "Máte v BIOSu aktivovaný XMP nebo EXPO profil pro RAM? Napište ano nebo ne do komentářů — tipuji, že polovina z vás ne."

  priority: "p50", priorityLabel: "50 %",
  tags: ["p50","lifestyle"],
  seoUrl: null, seoLabel: null,
  hook: "RGB — milujete ho nebo nenávidíte. Ať tak nebo tak, svítící počítač se stal fenoménem. Dneska vám ukážu, jak udělat herní setup opravdu efektní — a co přitom nezanedbat.",
  body: `Začněme tím nejdůležitějším: RGB neovlivňuje výkon počítače. Absolutně nijak. Je to čistě estetická záležitost. A pokud vám světla vadí, není žádný problém koupit výkonné komponenty bez RGB — výrobci jako Noctua nebo be quiet! staví na designovém minimalismu.

let activeFilter = 'all';

function renderCards() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  scripts.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.tags = s.tags.join(' ');
    el.dataset.title = s.title.toLowerCase();
    const seoHtml = s.seoUrl
      ? `<div class="seo-url">🔗 SEO URL: <a href="${s.seoUrl}" target="_blank">${s.seoLabel}</a></div>`
      : `<div class="seo-url" style="color:var(--muted);border-color:var(--border);">📝 URL bude nasazena (viz SEO plán)</div>`;
    el.innerHTML = `
      <div class="card-header" onclick="toggle(this)">
        <span class="priority ${s.priority}">${s.priorityLabel}</span>
        <span class="card-title">${s.title}</span>
        <span class="chevron">▼</span>
      </div>
      <div class="card-body">
        ${seoHtml}
        <div>
          <div class="hook-label">🎣 HOOK</div>
          <div class="hook">${s.hook}</div>
        </div>
        <div class="body-text">${s.body.trim()}</div>
        <div>
          <div class="cta-label">📣 CALL TO ACTION</div>
          <div class="cta-block">${s.cta}</div>
        </div>
        <div class="card-footer">
          <span class="char-count" id="cc${i}"></span>
          <button class="copy-btn" onclick="copyScript(this,${i})">📋 Kopírovat scénář</button>
        </div>
      </div>`;
    grid.appendChild(el);
  });
  updateCount();
}

function toggle(header) {
  const body = header.nextElementSibling;
  const chevron = header.querySelector('.chevron');
  body.classList.toggle('open');
  chevron.classList.toggle('open');
  if (body.classList.contains('open')) {
    const idx = [...document.querySelectorAll('.card-header')].indexOf(header);
    const s = scripts[idx];
    const full = `${s.hook}\n\n${s.body.trim()}\n\n${s.cta}`;
    document.getElementById('cc'+idx).textContent = full.length + ' znaků';
  }
}

function copyScript(btn, i) {
  const s = scripts[i];
  const full = `${s.title}\n\nHOOK:\n${s.hook}\n\n${s.body.trim()}\n\nCTA:\n${s.cta}`;
  navigator.clipboard.writeText(full.trim()).then(() => {
    btn.textContent = '✅ Zkopírováno!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 Kopírovat scénář'; btn.classList.remove('copied'); }, 2000);
  });
}

function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  filterCards();
}

function filterCards() {
  const q = document.querySelector('.search').value.toLowerCase();
  let vis = 0;
  document.querySelectorAll('.card').forEach(c => {
    const matchFilter = activeFilter === 'all' || c.dataset.tags.includes(activeFilter);
    const matchSearch = !q || c.dataset.title.includes(q);
    const show = matchFilter && matchSearch;
    c.classList.toggle('hidden', !show);
    if (show) vis++;
  });
  document.getElementById('count').textContent = vis + ' scénářů';
}

function updateCount() {
  document.getElementById('count').textContent = scripts.length + ' scénářů';
}

renderCards();
</script>
</body>
</html>
