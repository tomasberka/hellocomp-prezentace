  .info-bar { background: rgba(37,99,235,.12); border-bottom: 1px solid rgba(37,99,235,.25); padding: 10px 24px; font-size: 0.82rem; color: #93C5FD; }
  .page { max-width: 1200px; margin: 0 auto; padding: 24px; }

  .carousel-topic { font-size: 1.05rem; font-weight: 700; }
  .carousel-tag { font-size: 0.75rem; padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border); color: var(--muted); }
  .slides { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  @media(max-width:700px) { .slides { grid-template-columns: 1fr; } }

  /* Template mockup */
  .slide-wrap { display: flex; flex-direction: column; gap: 10px; }
  .slide-label { font-size: 0.75rem; color: var(--muted); font-weight: 600; letter-spacing: .06em; text-transform: uppercase; }
  .slide-label span { color: var(--lightblue); }
  .mockup {
    position: relative;
    width: 100%;
    aspect-ratio: 4/5;
    border-radius: 14px;
    overflow: hidden;
    background: #050c1a;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
  }
  /* Circuit board pattern background */
  .mockup-bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(37,99,235,.3) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 30%, rgba(6,182,212,.2) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 80%, rgba(37,99,235,.2) 0%, transparent 50%),
      linear-gradient(135deg, #050c1a 0%, #0a1628 100%);
  }
  /* Circuit line decorations */
  .mockup-bg::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      repeating-linear-gradient(0deg, rgba(37,99,235,.08) 0px, transparent 1px, transparent 30px),
      repeating-linear-gradient(90deg, rgba(37,99,235,.08) 0px, transparent 1px, transparent 30px);
  }
  .mockup-bg::after {
    content: '';
    position: absolute; inset: 0;
    background:

      radial-gradient(circle at 85% 75%, rgba(37,99,235,.2) 0%, transparent 25%),
      radial-gradient(circle at 70% 15%, rgba(6,182,212,.1) 0%, transparent 20%);
  }
  .card-inner {
    position: absolute;
    left: 8%; right: 8%; top: 5%; bottom: 5%;
    background: rgba(245,248,255,0.97);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    padding: 18px 16px 14px;
    box-shadow: 0 4px 24px rgba(0,0,0,.3);

  .card-content { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 8px; }
  .card-headline { font-size: 1.05rem; font-weight: 800; color: #111827; line-height: 1.3; }
  .card-body-text { font-size: 0.72rem; color: #374151; line-height: 1.6; }

  .card-bullets li { font-size: 0.7rem; color: #374151; line-height: 1.5; }
  .swipe-hint { font-size: 0.68rem; color: #2563EB; font-weight: 700; margin-top: 6px; }
  <script src="assets/auth.js" defer></script>
</head>

function buildCard(slide, idx) {
  let contentHtml = '';
  const headline = slide.headline.replace(/\n/g, '<br>');
  contentHtml += `<div class="card-headline">${headline}</div>`;
  if (slide.body) {
    contentHtml += `<div class="card-body-text" style="margin-top:6px">${slide.body.replace(/\n/g, '<br>')}</div>`;
  }
  if (slide.bullets) {
    contentHtml += `<ul class="card-bullets" style="margin-top:4px">`;
    slide.bullets.forEach(b => {
      contentHtml += `<li>${b || '&nbsp;'}</li>`;
    });
    contentHtml += `</ul>`;
  }
  if (slide.swipe) {
    contentHtml += `<div class="swipe-hint">${slide.swipe}</div>`;
  }
  return `
    <div class="slide-wrap">
      <div class="slide-label">${slide.label}</div>
      <div class="mockup">
        <div class="mockup-bg"></div>
        <div class="card-inner">
          <div class="card-content">${contentHtml}</div>
          <div class="card-logo">
            <div class="logo-text">hello comp</div>
            <div class="logo-smile"></div>
          </div>
        </div>
      </div>
      <div class="copy-panel">
        <pre id="text-${idx.c}-${idx.s}">${buildPlainText(slide)}</pre>
        <button class="copy-btn" onclick="copySlide(${idx.c},${idx.s},this)">📋 Kopírovat text slidu</button>
      </div>
    </div>`;
}

function buildPlainText(slide) {
  let t = slide.headline + '\n\n';
  if (slide.body) t += slide.body + '\n';
  if (slide.bullets) t += '\n' + slide.bullets.filter(b=>b).join('\n');
  if (slide.swipe) t += '\n\n' + slide.swipe;
  return t.trim();
}

function copySlide(ci, si, btn) {
  const el = document.getElementById(`text-${ci}-${si}`);
  navigator.clipboard.writeText(el.textContent.trim()).then(() => {
    btn.textContent = '✅ Zkopírováno!';
    btn.classList.add('ok');
    setTimeout(() => { btn.textContent = '📋 Kopírovat text slidu'; btn.classList.remove('ok'); }, 2000);
  });
}

  c.slides.forEach((s, si) => { slidesHtml += buildCard(s, {c:ci, s:si}); });
  sec.innerHTML = `
    <div class="carousel-meta">
      <span class="carousel-num">Karusel ${ci+1}</span>
      <span class="carousel-topic">${c.topic}</span>
      <span class="carousel-tag">${c.tag}</span>
    </div>
    <div class="slides">${slidesHtml}</div>`;
  page.appendChild(sec);
  if (ci < carousels.length - 1) {
    const hr = document.createElement('hr');
    hr.className = 'divider';
    hr.style.marginBottom = '48px';
    page.appendChild(hr);
  }
});
</script>
</body>
</html>
