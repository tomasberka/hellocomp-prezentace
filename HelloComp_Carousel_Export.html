<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>HelloComp Carousel Export — 1080×1440</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#05080f;--bg2:#0d1527;--bg3:#111f38;--card:#0f1c35;
  --border:#1e3a6e;--blue:#1d4ed8;--blue2:#3b82f6;--blue3:#60a5fa;
  --cyan:#0ea5e9;--cyan2:#38bdf8;--text:#e2e8f0;--muted:#94a3b8;--white:#f8fafc;
  --green:#22c55e;--purple:#7c3aed;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.hdr{background:#0a1628;border-bottom:2px solid var(--blue);padding:12px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.hdr-title{font-size:17px;font-weight:700;color:var(--white)}
.hdr-title span{color:var(--blue2)}
.hdr-sub{font-size:11px;color:var(--muted)}
.hdr-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.main{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sidebar{width:280px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.sidebar-hdr{padding:10px 12px;border-bottom:1px solid var(--border);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:flex;justify-content:space-between}
.car-list{flex:1;overflow-y:auto;padding:6px}
.car-item{padding:8px 10px;border-radius:6px;cursor:pointer;margin-bottom:3px;border:1px solid transparent;transition:all .12s}
.car-item:hover{background:var(--bg3);border-color:var(--border)}
.car-item.active{background:rgba(59,130,246,.12);border-color:var(--blue2)}
.car-item-title{font-size:12px;color:var(--white);font-weight:500;line-height:1.3;margin-bottom:3px}
.car-item-meta{display:flex;gap:5px;align-items:center}
.wave-v1{display:inline-block;padding:1px 6px;border-radius:8px;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;background:rgba(124,58,237,.2);color:#c4b5fd;border:1px solid rgba(124,58,237,.3)}
.wave-v2{display:inline-block;padding:1px 6px;border-radius:8px;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;background:rgba(8,145,178,.2);color:var(--cyan2);border:1px solid rgba(8,145,178,.3)}
.slide-count{font-size:10px;color:var(--muted)}

/* CANVAS AREA */
.canvas-area{flex:1;display:flex;flex-direction:column;align-items:center;overflow:auto;padding:20px;gap:16px}
.canvas-wrap{position:relative;box-shadow:0 0 40px rgba(29,78,216,.25),0 0 0 1px rgba(59,130,246,.2)}
canvas{display:block}
.canvas-size-badge{position:absolute;top:-22px;right:0;font-size:10px;color:var(--muted);background:var(--bg2);padding:2px 8px;border-radius:8px;border:1px solid var(--border)}

/* CONTROLS */
.controls{width:260px;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.ctrl-section{padding:14px;border-bottom:1px solid var(--border)}
.ctrl-section h3{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:10px}
.slide-nav{display:flex;align-items:center;gap:8px;justify-content:center}
.nav-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);width:34px;height:34px;border-radius:6px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.nav-btn:hover:not(:disabled){background:var(--blue);border-color:var(--blue);color:#fff}
.nav-btn:disabled{opacity:.3;cursor:default}
.slide-indicator{font-size:13px;color:var(--white);font-weight:600;min-width:50px;text-align:center}
.dots{display:flex;gap:5px;justify-content:center;margin-top:8px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--border);cursor:pointer;transition:all .12s}
.dot.active{background:var(--blue2);width:20px;border-radius:4px}
.dot:hover{background:var(--blue3)}

/* TEMPLATE CONTROLS */
.ctrl-row{margin-bottom:8px}
.ctrl-row label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px}
.ctrl-row select,.ctrl-row input[type=color]{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:5px;font-size:12px;cursor:pointer}
.ctrl-row input[type=color]{height:32px;padding:2px}
.toggle-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.toggle-row label{font-size:12px;color:var(--text)}
.toggle{width:36px;height:20px;background:var(--bg3);border-radius:10px;cursor:pointer;position:relative;border:1px solid var(--border);transition:background .15s}
.toggle.on{background:var(--blue)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:left .15s}
.toggle.on::after{left:18px}

/* EXPORT BUTTONS */
.exp-btn{width:100%;padding:9px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;border:none;margin-bottom:6px;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.exp-btn.primary{background:var(--blue);color:#fff}
.exp-btn.primary:hover{background:var(--blue2)}
.exp-btn.secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.exp-btn.secondary:hover{background:var(--border)}
.exp-btn.success{background:#166534;color:#bbf7d0}
.progress{font-size:11px;color:var(--muted);text-align:center;margin-top:4px;min-height:16px}
.zip-note{font-size:10px;color:var(--muted);text-align:center;margin-top:4px;line-height:1.4}

/* TEMPLATE PREVIEW SWATCH */
.swatch-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.swatch{width:28px;height:28px;border-radius:5px;cursor:pointer;border:2px solid transparent;transition:border-color .1s}
.swatch.active{border-color:var(--blue2)}

/* ZOOM */
.zoom-row{display:flex;gap:6px;align-items:center;justify-content:center}
.zoom-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);width:28px;height:28px;border-radius:5px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.zoom-btn:hover{background:var(--border)}
.zoom-val{font-size:12px;color:var(--text);min-width:36px;text-align:center}
</style>
</head>
<body>

<div class="hdr">
  <svg width="24" height="24" viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="#1d4ed8"/><path d="M8 22L14 10L20 22M11 18H17" stroke="#60a5fa" stroke-width="2.2" stroke-linecap="round"/><circle cx="23" cy="14" r="4" fill="#0ea5e9"/></svg>
  <div>
    <div class="hdr-title">Hello<span>Comp</span> Carousel Export</div>
    <div class="hdr-sub">1080 × 1440 px · Instagram portrait · PNG export</div>
  </div>
  <div class="hdr-right">
    <span style="font-size:11px;color:var(--muted)">20 carouselů · 90 slidů</span>
  </div>
</div>

<div class="main">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-hdr">
      <span>Carousely</span>
      <span id="waveFilter" style="cursor:pointer;color:var(--blue3)">Vše ▾</span>
    </div>
    <div class="car-list" id="carList"></div>
  </div>

  <!-- CANVAS AREA -->
  <div class="canvas-area" id="canvasArea">
    <div class="canvas-wrap" id="canvasWrap">
      <div class="canvas-size-badge" id="sizeBadge">1080 × 1440 px</div>
      <canvas id="mainCanvas"></canvas>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <div class="ctrl-section">
      <h3>Slide navigace</h3>
      <div class="slide-nav">
        <button class="nav-btn" id="prevBtn" onclick="prevSlide()">‹</button>
        <span class="slide-indicator" id="slideInd">1 / 3</span>
        <button class="nav-btn" id="nextBtn" onclick="nextSlide()">›</button>
      </div>
      <div class="dots" id="dots"></div>
    </div>

    <div class="ctrl-section">
      <h3>Šablona</h3>
      <div class="ctrl-row">
        <label>Styl pozadí</label>
        <select id="bgStyle" onchange="redraw()">
          <option value="brand" selected>Brand (IG šablona)</option>
          <option value="dark">Tmavé (navy gradient)</option>
          <option value="transparent">Průhledné</option>
          <option value="blue">Modrý gradient</option>
          <option value="black">Pure black</option>
        </select>
      </div>
      <div class="ctrl-row">
        <label>Akcent barva</label>
        <div class="swatch-row" id="swatchRow">
          <div class="swatch active" style="background:#1d4ed8" data-color="#1d4ed8" onclick="setAccent(this)"></div>
          <div class="swatch" style="background:#0ea5e9" data-color="#0ea5e9" onclick="setAccent(this)"></div>
          <div class="swatch" style="background:#7c3aed" data-color="#7c3aed" onclick="setAccent(this)"></div>
          <div class="swatch" style="background:#059669" data-color="#059669" onclick="setAccent(this)"></div>
          <div class="swatch" style="background:#dc2626" data-color="#dc2626" onclick="setAccent(this)"></div>
          <div class="swatch" style="background:#d97706" data-color="#d97706" onclick="setAccent(this)"></div>
        </div>
      </div>
      <div class="toggle-row">
        <label>Zobrazit logo</label>
        <div class="toggle on" id="toggleLogo" onclick="toggleOpt('logo',this)"></div>
      </div>
      <div class="toggle-row">
        <label>Zobrazit wave tag</label>
        <div class="toggle on" id="toggleWave" onclick="toggleOpt('wave',this)"></div>
      </div>
      <div class="toggle-row">
        <label>Slide dots</label>
        <div class="toggle on" id="toggleDots" onclick="toggleOpt('dots',this)"></div>
      </div>
      <div class="toggle-row">
        <label>CTA / swipe hint</label>
        <div class="toggle on" id="toggleCta" onclick="toggleOpt('cta',this)"></div>
      </div>
    </div>

    <div class="ctrl-section">
      <h3>Zoom</h3>
      <div class="zoom-row">
        <button class="zoom-btn" onclick="zoom(-0.1)">−</button>
        <span class="zoom-val" id="zoomVal">50%</span>
        <button class="zoom-btn" onclick="zoom(+0.1)">+</button>
        <button class="zoom-btn" onclick="zoomFit()" title="Fit">⊡</button>
      </div>
    </div>

    <div class="ctrl-section">
      <h3>Export PNG</h3>
      <button class="exp-btn primary" onclick="exportCurrent()">⬇ Stáhnout tento slide</button>
      <button class="exp-btn secondary" onclick="exportAll()">⬇ Stáhnout všechny slides</button>
      <div class="progress" id="progress"></div>
      <div class="zip-note">Soubory se stáhnou jako:<br>CarouselName_slide01.png atd.</div>
    </div>
  </div>
</div>

: "PC výkon", "body": "Min: Core i7-14700K nebo Ryzen 7 7700X + RTX 4070 (NVENC). GPU enkodér = žádná CPU zátěž při hraní."}, {"n": 3, "head": "Mikrofon", "body": "USB kondenzátorový minimum. Blue Yeti (2 400 Kč) nebo HyperX Quadcast S (2 100 Kč). Headset mikrofon = sub-standard."}, {"n": 4, "head": "Internet", "body": "Upload min 6 Mbps pro 1080p60. 10 Mbps pro komfort. Kabelový ethernet vždy lepší než Wi-Fi pro stream."}, {"n": 5, "head": "OBS nastavení", "body": "NVENC H.264 nebo AV1. Bitrate 6 000 kbps. Keyframe 2s. Resolution 1920×1080. Celý OBS guide v článku — link v biu."}], "wave": "v2", "_title": "Streaming setup checklist", "_type": "Blog", "_linkedLabel": "Blog: PC pro streaming"}, {"id": "car2_05", "title": "Esports PC — CS2, Valorant, LoL", "linkedUrl": "https://www.hellocomp.cz/esports-pc-sestavy/", "linkedType": "Kategorie", "linkedLabel": "Kategorie: Herní PC sestavy", "hook": "CS2 na 300 FPS? Tady je co přesně potřebuješ", "slides": [{"n": 1, "head": "Esports PC 2025", "body": "CS2, Valorant, LoL. 3 hry, 3 různé nároky. Co přesně stačí a co je zbytečné? →"}, {"n": 2, "head": "CS2 — 300 FPS", "body": "Core i5-13400F + RTX 4060 + 16 GB DDR5. 1080p Low settings. Stabilní 300+ FPS. Celá sestava do 20 000 Kč."}, {"n": 3, "head": "Valorant — 400 FPS", "body": "Core i5-13600K + RTX 3060. 1080p Low. 400+ FPS. Monitor min 240 Hz aby mělo smysl."}, {"n": 4, "head": "LoL / MOBA", "body": "Core i3-13100 + GTX 1660 Super. 300+ FPS na Ultra. CPU single-core výkon rozhoduje, ne GPU."}, {"n": 5, "head": "Klíč: monitor", "body": "Bez 240 Hz+ monitoru nepocítíte rozdíl mezi 200 a 400 FPS. Celé sestavy pro esports — link v biu."}], "wave": "v2", "_title": "Esports PC — CS2, Valorant, LoL", "_type": "Kategorie", "_linkedLabel": "Kategorie: Herní PC sestavy"}, {"id": "car2_06", "title": "Dual monitor setup — 3 kroky", "linkedUrl": "https://www.hellocomp.cz/dual-monitor-setup/", "linkedType": "Blog", "linkedLabel": "Blog: Dual monitor setup", "hook": "Dual monitor setup // State
var curCar=0, curSlide=0, zoomLevel=0.5;
var opts={logo:true,wave:true,dots:true,cta:true};
var accentColor='#1d4ed8';
var bgStyle='dark';

var canvas=document.getElementById('mainCanvas');
var ctx=canvas.getContext('2d');

canvas.width=CW; canvas.height=CH;

// ─── Helpers ────────────────────────────────────────────────
function getTitle(c){return c._title||c.title||c.topic||'';}
function getSlide(c,i){
  var sl=c.slides[i];
  if(!sl)return{head:'',body:'',swipe:''};
  if(c.wave==='v1'){
    return{
      label:sl.label||('Slide '+(i+1)),
      head:sl.headline||'',
      body:sl.body||'',
      swipe:sl.swipe||''
    };
  }else{
    return{
      label:'Slide '+(sl.n||i+1),
      head:sl.head||sl.headline||'',
      body:sl.body||'',
      swipe:''
    };
  }
}

function wrapText(ctx,text,x,y,maxW,lineH){
  if(!text)return y;
  var words=text.split(' '), line='', lines=[];
  for(var i=0;i<words.length;i++){
    var test=line+(line?' ':'')+words[i];
    if(ctx.measureText(test).width>maxW&&line){lines.push(line);line=words[i];}
    else line=test;
  }
  lines.push(line);
  lines.forEach(function(l){ctx.fillText(l,x,y);y+=lineH;});
  return y;
}

function wrapTextLines(ctx,text,maxW){
  if(!text)return[];
  // handle \n line breaks too
  var paras=text.split('\n');
  var allLines=[];
  paras.forEach(function(para){
    if(!para.trim()){allLines.push('');return;}
    var words=para.split(' '),line='';
    for(var i=0;i<words.length;i++){
      var test=line+(line?' ':'')+words[i];
      if(ctx.measureText(test).width>maxW&&line){allLines.push(line);line=words[i];}
      else line=test;
    }
    allLines.push(line);
  });
  return allLines;
}

// ─── DRAW ────────────────────────────────────────────────────
// ─── PCB / Motherboard decoration ────────────────────────────
function drawMobo(ct, W, H, acc, accentB){
  ct.save();

  /* ── green PCB tint on outer frame ── */
  var pcbGrad = ct.createLinearGradient(0,0,W,H);
  pcbGrad.addColorStop(0,'rgba(0,30,10,0.55)');
  pcbGrad.addColorStop(0.5,'rgba(0,15,5,0.3)');
  pcbGrad.addColorStop(1,'rgba(0,25,8,0.55)');
  ct.fillStyle = pcbGrad;
  ct.fillRect(0,0,W,H);

  /* ── circuit traces ── */
  var traceAlpha = 0.45;
  function trace(x1,y1,x2,y2,col,w){
    ct.globalAlpha = traceAlpha;
    ct.strokeStyle = col || acc;
    ct.lineWidth   = w || 2;
    ct.beginPath(); ct.moveTo(x1,y1); ct.lineTo(x2,y2); ct.stroke();
    /* solder dot at end */
    ct.globalAlpha = traceAlpha * 0.9;
    ct.fillStyle = col || acc;
    ct.beginPath(); ct.arc(x2,y2,w?w*2:4,0,Math.PI*2); ct.fill();
  }

  /* LEFT SIDE traces */
  trace(0,40,  55,40);  trace(55,40,  55,80);  trace(55,80,  95,80);
  trace(0,100, 42,100); trace(42,100, 42,140);
  trace(0,180, 60,180); trace(60,180, 60,220); trace(60,220, 30,220);
  trace(0,300, 50,300); trace(50,300, 50,360); trace(50,360, 80,360);
  trace(0,440, 55,440); trace(55,440, 55,500);
  trace(0,560, 45,560); trace(45,560, 45,600); trace(45,600, 75,600);
  trace(0,700, 58,700); trace(58,700, 58,740);
  trace(0,820, 52,820); trace(52,820, 52,860); trace(52,860, 30,860);
  trace(0,940, 60,940); trace(60,940, 60,980);
  trace(0,1060,48,1060);trace(48,1060,48,1100);trace(48,1100,78,1100);
  trace(0,1200,55,1200);trace(55,1200,55,1250);
  trace(0,1320,50,1320);trace(50,1320,50,1370);

  /* RIGHT SIDE traces */
  trace(W,50,  W-55,50);  trace(W-55,50, W-55,90);  trace(W-55,90, W-95,90);
  trace(W,130, W-42,130); trace(W-42,130,W-42,170);
  trace(W,250, W-60,250); trace(W-60,250,W-60,290);
  trace(W,370, W-50,370); trace(W-50,370,W-50,430);
  trace(W,500, W-55,500); trace(W-55,500,W-55,540);
  trace(W,650, W-48,650); trace(W-48,650,W-48,690); trace(W-48,690,W-78,690);
  trace(W,800, W-58,800); trace(W-58,800,W-58,840);
  trace(W,950, W-52,950); trace(W-52,950,W-52,990);
  trace(W,1100,W-48,1100);trace(W-48,1100,W-48,1140);
  trace(W,1260,W-55,1260);trace(W-55,1260,W-55,1310);
  trace(W,1380,W-50,1380);trace(W-50,1380,W-50,1420);

  /* TOP traces */
  trace(80,0,  80,50);  trace(80,50,  120,50);
  trace(200,0, 200,42); trace(200,42, 160,42);
  trace(340,0, 340,55); trace(340,55, 380,55);
  trace(500,0, 500,45);
  trace(650,0, 650,50); trace(650,50, 610,50);
  trace(800,0, 800,48); trace(800,48, 840,48);
  trace(950,0, 950,55);
  trace(W-200,0,W-200,42);trace(W-200,42,W-240,42);
  trace(W-80, 0,W-80,50); trace(W-80,50, W-120,50);

  /* BOTTOM traces */
  trace(80,  H,80,  H-50); trace(80,  H-50,120,  H-50);
  trace(250, H,250, H-45); trace(250, H-45,210,  H-45);
  trace(450, H,450, H-52); trace(450, H-52,490,  H-52);
  trace(650, H,650, H-48); trace(650, H-48,610,  H-48);
  trace(850, H,850, H-50); trace(850, H-50,890,  H-50);
  trace(W-80,H,W-80,H-55); trace(W-80,H-55,W-120,H-55);

  /* ── IC chips (rectangles) ── */
  function chip(x,y,w,h,col){
    ct.globalAlpha = 0.35;
    ct.fillStyle   = col || '#1a2a14';
    ct.strokeStyle = acc;
    ct.lineWidth   = 1.5;
    roundRect(ct,x,y,w,h,3);ct.fill();
    roundRect(ct,x,y,w,h,3);ct.stroke();
    /* pin lines */
    ct.globalAlpha = 0.3;
    ct.strokeStyle = acc;ct.lineWidth=1;
    var pins=3;
    for(var p=0;p<pins;p++){
      var px=x+6+(p*(w-12)/(pins-1));
      ct.beginPath();ct.moveTo(px,y);ct.lineTo(px,y-8);ct.stroke();
      ct.beginPath();ct.moveTo(px,y+h);ct.lineTo(px,y+h+8);ct.stroke();
    }
  }
  chip(15,55,  36,22);
  chip(15,210, 36,22);
  chip(15,480, 36,22);
  chip(15,820, 36,22);
  chip(15,1100,36,22);
  chip(W-51,100,36,22);
  chip(W-51,380,36,22);
  chip(W-51,700,36,22);
  chip(W-51,1000,36,22);

  /* ── capacitors (small rounded rects with + mark) ── */
  function cap(x,y,col){
    ct.globalAlpha = 0.5;
    ct.fillStyle = col || '#0d2010';
    ct.strokeStyle = acc;ct.lineWidth=1.5;
    roundRect(ct,x-8,y-12,16,24,8);ct.fill();
    roundRect(ct,x-8,y-12,16,24,8);ct.stroke();
    ct.globalAlpha=0.6;ct.fillStyle=acc;
    ct.fillRect(x-4,y-2,8,2);ct.fillRect(x-1,y-5,2,8);
  }
  cap(30,340); cap(30,600); cap(30,900); cap(30,1180);
  cap(W-30,200); cap(W-30,500); cap(W-30,850); cap(W-30,1130);

  /* ── LED glow spots ── */
  function led(x,y,col,r){
    ct.globalAlpha=1;
    var gl=ct.createRadialGradient(x,y,0,x,y,r||80);
    gl.addColorStop(0,col+'cc');
    gl.addColorStop(0.3,col+'44');
    gl.addColorStop(1,'rgba(0,0,0,0)');
    ct.fillStyle=gl;ct.fillRect(x-r,y-r,r*2,r*2);
  }
  led(0,   0,   '#1d4ed8', 200);
  led(W,   0,   '#0891b2', 160);
  led(0,   H,   '#06b6d4', 180);
  led(W,   H,   '#1d4ed8', 200);
  led(W/2, 0,   '#2962cd', 120);
  led(W/2, H,   '#0ea5e9', 100);
  led(0,   H/2, '#1e40af', 140);
  led(W,   H/2, '#0369a1', 140);

  ct.globalAlpha=1;
  ct.restore();
}

function drawSlide(cvs, c, slideIdx, isExport){
  var ct=cvs.getContext('2d');
  var W=CW,H=CH;
  ct.clearRect(0,0,W,H);

  var sl=getSlide(c,slideIdx);
  var totalSlides=c.slides.length;
  var wave=c.wave||'v1';
  var acc=accentColor;
  var bg=bgStyle;
  var isBrand=(bg==='brand');

  // ── Background ──────────────────────────────
  if(bg==='transparent'){
    /* nothing */
  } else if(isBrand){
    /* deep dark base */
    ct.fillStyle='#020509';
    ct.fillRect(0,0,W,H);
    /* motherboard decoration */
    drawMobo(ct,W,H,acc,'#0ea5e9');
    /* white content card with blue shadow */
    var cx=66,cy=82,cw=W-132,ch=H-164;
    ct.shadowColor='rgba(29,78,216,0.55)';
    ct.shadowBlur=40;
    ct.fillStyle='#ffffff';
    roundRect(ct,cx,cy,cw,ch,18);ct.fill();
    ct.shadowBlur=0;
    /* inner top accent gradient */
    var topGrad=ct.createLinearGradient(0,cy,0,cy+200);
    topGrad.addColorStop(0,'rgba(219,234,254,0.5)');
    topGrad.addColorStop(1,'rgba(255,255,255,0)');
    ct.fillStyle=topGrad;
    roundRect(ct,cx,cy,cw,200,18);ct.fill();
  } else {
    if(bg==='dark'){
      var grad=ct.createLinearGradient(0,0,0,H);
      grad.addColorStop(0,'#05080f');grad.addColorStop(0.45,'#0d1527');grad.addColorStop(1,'#05080f');
      ct.fillStyle=grad;
    }else if(bg==='blue'){
      var grad=ct.createLinearGradient(0,0,W,H);
      grad.addColorStop(0,'#0a1628');grad.addColorStop(0.5,'#1e3a8a');grad.addColorStop(1,'#0a1628');
      ct.fillStyle=grad;
    }else if(bg==='black'){
      ct.fillStyle='#000';
    }
    ct.fillRect(0,0,W,H);
    /* add mobo decoration on dark themes too */
    drawMobo(ct,W,H,acc,'#0ea5e9');
    ct.fillStyle='rgba('+hexToR(acc)+','+hexToG(acc)+','+hexToB(acc)+',0.05)';
    ct.beginPath();ct.arc(W/2,H*0.4,480,0,Math.PI*2);ct.fill();
  }

  /* ── Content coordinates ── */
  var OX=isBrand?66+38:0;
  var OY=isBrand?82+38:0;
  var maxTextW=isBrand?(W-132-76-96):(W-96);
  var textX=OX+48;
  var textCol  = isBrand?'#0f172a':'#f8fafc';
  var bodyCol  = isBrand?'#374151':'#cbd5e1';
  var mutedCol = isBrand?'#9ca3af':'#475569';
  var swipeCol = isBrand?'#6b7280':'#334155';

  /* ── Top accent bar (dark themes only) ── */
  if(!isBrand){
    ct.fillStyle=acc;ct.fillRect(0,0,W,8);
  }

  /* ── Logo ── */
  if(opts.logo){
    var logoImg = isBrand ? LOGO_DARK : LOGO_WHITE;
    if(logoImg && logoImg.complete && logoImg.naturalWidth>0){
      /* logo viewBox 429×100, render at nice size */
      var lh=52, lw=Math.round(429/100*lh);
      ct.drawImage(logoImg, textX, OY+20, lw, lh);
    } else {
      /* fallback text logo */
      ct.textBaseline='alphabetic';ct.textAlign='left';
      ct.font='bold 34px "Segoe UI",system-ui,sans-serif';
      ct.fillStyle=isBrand?'#0f172a':'#f8fafc';
      ct.fillText('hello',textX,OY+60);
      var hw=ct.measureText('hello').width;
      ct.fillStyle=acc;ct.fillText(' comp',textX+hw,OY+60);
    }
    /* hellocomp.cz tag */
    ct.font='500 17px "Segoe UI",system-ui,sans-serif';
    ct.fillStyle=mutedCol;ct.textAlign='left';ct.textBaseline='top';
    ct.fillText('hellocomp.cz',textX,OY+80);
  }

  /* ── Wave badge ── */
  if(opts.wave){
    var wc=wave==='v1'?['#7c3aed','#c4b5fd']:['#0891b2','#67e8f9'];
    var bw=52,bh=26,bx=isBrand?(W-66-38-bw-8):(W-48-bw),by=OY+20;
    ct.fillStyle=wc[0]+'33';
    roundRect(ct,bx,by,bw,bh,13);ct.fill();
    ct.strokeStyle=wc[0]+'88';ct.lineWidth=1.5;
    roundRect(ct,bx,by,bw,bh,13);ct.stroke();
    ct.fillStyle=wc[1];ct.font='bold 15px "Segoe UI",system-ui,sans-serif';
    ct.textAlign='center';ct.textBaseline='middle';
    ct.fillText(wave.toUpperCase(),bx+bw/2,by+bh/2);
  }

  /* ── Divider ── */
  var divY=isBrand?(OY+108):(OY+118);
  ct.fillStyle=acc;
  var divW=isBrand?(maxTextW+96):(W-96);
  ct.fillRect(textX,divY,divW,isBrand?2:3);
  if(!isBrand){
    var divFade=ct.createLinearGradient(W*0.6,0,W-96,0);
    divFade.addColorStop(0,'rgba(0,0,0,0)');
    divFade.addColorStop(1,'rgba(5,8,15,1)');
    ct.fillStyle=divFade;ct.fillRect(48,divY,W-96,3);
  }

  /* ── Slide label ── */
  ct.font='500 21px "Segoe UI",system-ui,sans-serif';
  ct.fillStyle=mutedCol;ct.textAlign='left';ct.textBaseline='top';
  ct.fillText((sl.label||('Slide '+(slideIdx+1))).toUpperCase(),textX,divY+14);

  /* ── Headline ── */
  var headText=sl.head||'';
  var headLines=headText.split('\n');
  var headFontSize=isBrand?68:78;
  ct.font='bold '+headFontSize+'px "Segoe UI",system-ui,sans-serif';
  ct.fillStyle=textCol;ct.textAlign='left';ct.textBaseline='top';
  var headY=divY+52;
  var headLineH=isBrand?80:90;
  headLines.forEach(function(rawLine){
    var wrapped=wrapTextLines(ct,rawLine,maxTextW);
    wrapped.forEach(function(l){ct.fillText(l,textX,headY);headY+=headLineH;});
  });
  headY+=18;

  /* accent underline */
  ct.fillStyle=acc;ct.fillRect(textX,headY-10,80,5);
  headY+=16;

  /* ── Body ── */
  var bodyText=sl.body||'';
  ct.font='500 34px "Segoe UI",system-ui,sans-serif';
  ct.fillStyle=bodyCol;ct.textAlign='left';ct.textBaseline='top';
  var bodyLines=wrapTextLines(ct,bodyText,maxTextW);
  var bodyLineH=50;
  var bodyY=headY+8;
  var botSectionTop=isBrand?(H-82-170):(H-160);
  var maxBodyY=botSectionTop-80;
  bodyLines.forEach(function(l){
    if(bodyY>maxBodyY)return;
    if(!l){bodyY+=bodyLineH*0.5;return;}
    ct.fillText(l,textX,bodyY);bodyY+=bodyLineH;
  });

  /* ── Swipe hint ── */
  if(opts.cta&&sl.swipe&&slideIdx<totalSlides-1){
    ct.font='italic 27px "Segoe UI",system-ui,sans-serif';
    ct.fillStyle=swipeCol;ct.textAlign='left';
    ct.fillText(sl.swipe,textX,botSectionTop-50);
  }

  /* ── Bottom section ── */
  var botLineY=isBrand?(H-82-120):(H-160);
  if(isBrand){
    ct.strokeStyle='#e2e8f0';ct.lineWidth=1;
    ct.beginPath();ct.moveTo(textX,botLineY);ct.lineTo(W-66-38-48,botLineY);ct.stroke();
  } else {
    ct.fillStyle='#1e293b';ct.fillRect(0,H-160,W,160);
    ct.fillStyle=acc+'44';ct.fillRect(0,H-160,W,2);
  }

  /* dots */
  if(opts.dots){
    var dotW2=totalSlides*22+(totalSlides-1)*10;
    var dotX=(W-dotW2)/2;
    var dotY2=isBrand?(botLineY+18):(H-160+34);
    for(var d=0;d<totalSlides;d++){
      ct.fillStyle=d===slideIdx?acc:(isBrand?'#cbd5e1':'#334155');
      if(d===slideIdx){roundRect(ct,dotX,dotY2,28,10,5);ct.fill();dotX+=38;}
      else{ct.beginPath();ct.arc(dotX+5,dotY2+5,5,0,Math.PI*2);ct.fill();dotX+=20;}
    }
  }

  /* counter + title */
  ct.font='bold 22px "Segoe UI",system-ui,sans-serif';
  ct.textAlign='right';ct.textBaseline='middle';
  ct.fillStyle=isBrand?'#94a3b8':'#475569';
  var ctrY=isBrand?(H-82-40):(H-160+35);
  ct.fillText((slideIdx+1)+' / '+totalSlides, isBrand?(W-66-38-48):W-48, ctrY);

  ct.font='500 21px "Segoe UI",system-ui,sans-serif';
  ct.textAlign='left';ct.textBaseline='middle';
  ct.fillStyle=isBrand?'#6b7280':'#334155';
  var titleShort=getTitle(c);
  if(titleShort.length>48)titleShort=titleShort.slice(0,45)+'...';
  ct.fillText(titleShort, textX, isBrand?(H-82-40):(H-160+80));

  /* bottom bar */
  ct.fillStyle=acc;ct.fillRect(0,H-8,W,8);
  if(isBrand){ct.fillStyle=acc;ct.fillRect(66,H-82-2,W-132,3);}
}

// ─── Hex helpers ────────────────────────────────────────────
function hexToR(h){return parseInt(h.slice(1,3),16)}
function hexToG(h){return parseInt(h.slice(3,5),16)}
function hexToB(h){return parseInt(h.slice(5,7),16)}
function lighten(hex){
  var r=Math.min(255,hexToR(hex)+80),g=Math.min(255,hexToG(hex)+80),b=Math.min(255,hexToB(hex)+80);
  return '#'+r.toString(16).padStart(2,'0')+g.toString(16).padStart(2,'0')+b.toString(16).padStart(2,'0');
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

// ─── Render & UI ────────────────────────────────────────────
function redraw(){
  bgStyle=document.getElementById('bgStyle').value;
  var c=DATA[curCar];
  drawSlide(canvas,c,curSlide,false);
  updateZoom();
}

function updateZoom(){
  var w=Math.round(CW*zoomLevel),h=Math.round(CH*zoomLevel);
  canvas.style.width=w+'px';canvas.style.height=h+'px';
  document.getElementById('zoomVal').textContent=Math.round(zoomLevel*100)+'%';
  document.getElementById('sizeBadge').textContent='1080 × 1440 px @ '+Math.round(zoomLevel*100)+'%';
}

function zoom(delta){zoomLevel=Math.max(0.2,Math.min(1.0,zoomLevel+delta));updateZoom();}
function zoomFit(){
  var area=document.getElementById('canvasArea');
  var availH=area.clientHeight-80;
  var availW=area.clientWidth-80;
  zoomLevel=Math.min(availW/CW,availH/CH);
  updateZoom();
}

function selectCar(idx){
  curCar=idx;curSlide=0;
  document.querySelectorAll('.car-item').forEach(function(el,i){el.classList.toggle('active',i===idx)});
  updateDots();
  updateNav();
  redraw();
}
function prevSlide(){if(curSlide>0){curSlide--;updateDots();updateNav();redraw();}}
function nextSlide(){if(curSlide<DATA[curCar].slides.length-1){curSlide++;updateDots();updateNav();redraw();}}
function goSlide(i){curSlide=i;updateDots();updateNav();redraw();}

function updateDots(){
  var c=DATA[curCar],n=c.slides.length;
  var dotsEl=document.getElementById('dots');
  dotsEl.innerHTML='';
  for(var i=0;i<n;i++){
    var d=document.createElement('div');
    d.className='dot'+(i===curSlide?' active':'');
    d.setAttribute('data-i',i);
    d.onclick=(function(idx){return function(){goSlide(idx)}})(i);
    dotsEl.appendChild(d);
  }
  document.getElementById('slideInd').textContent=(curSlide+1)+' / '+n;
}
function updateNav(){
  var n=DATA[curCar].slides.length;
  document.getElementById('prevBtn').disabled=curSlide===0;
  document.getElementById('nextBtn').disabled=curSlide===n-1;
}

function toggleOpt(key,el){opts[key]=!opts[key];el.classList.toggle('on',opts[key]);redraw();}
function setAccent(el){
  accentColor=el.getAttribute('data-color');
  document.querySelectorAll('.swatch').forEach(function(s){s.classList.remove('active')});
  el.classList.add('active');
  redraw();
}

// ─── Export ─────────────────────────────────────────────────
function slugify(s){return s.replace(/[^a-zA-Z0-9\u00C0-\u017F]/g,'_').replace(/_+/g,'_').slice(0,40);}

function exportCurrent(){
  var c=DATA[curCar];
  var filename=slugify(getTitle(c))+'_slide'+String(curSlide+1).padStart(2,'0')+'.png';
  canvas.toBlob(function(blob){
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');a.href=url;a.download=filename;a.click();
    URL.revokeObjectURL(url);
    var p=document.getElementById('progress');
    p.textContent='✓ Staženo: '+filename;
    setTimeout(function(){p.textContent=''},3000);
  },'image/png');
}

function exportAll(){
  var c=DATA[curCar];
  var n=c.slides.length;
  var p=document.getElementById('progress');
  var tmp=document.createElement('canvas');tmp.width=CW;tmp.height=CH;
  var i=0;
  function next(){
    if(i>=n){p.textContent='✓ Všechny slides staženy!';setTimeout(function(){p.textContent=''},4000);return;}
    p.textContent='Exportuji slide '+(i+1)+' / '+n+'...';
    drawSlide(tmp,c,i,true);
    var fname=slugify(getTitle(c))+'_slide'+String(i+1).padStart(2,'0')+'.png';
    tmp.toBlob(function(blob){
      var url=URL.createObjectURL(blob);
      var a=document.createElement('a');a.href=url;a.download=fname;a.click();
      URL.revokeObjectURL(url);
      i++;setTimeout(next,300);
    },'image/png');
  }
  next();
  // Redraw main canvas back to current slide after export
  setTimeout(function(){drawSlide(canvas,c,curSlide,false);},n*400);
}

// ─── Build sidebar ────────────────────────────────────────────
function buildSidebar(){
  var list=document.getElementById('carList');
  DATA.forEach(function(c,i){
    var div=document.createElement('div');
    div.className='car-item'+(i===0?' active':'');
    div.innerHTML='<div class="car-item-title">'+getTitle(c)+'</div>'
      +'<div class="car-item-meta">'
      +'<span class="wave-'+c.wave+'">'+c.wave+'</span>'
      +'<span class="slide-count">'+c.slides.length+' slidů</span>'
      +'</div>';
    div.onclick=(function(idx){return function(){selectCar(idx)}})(i);
    list.appendChild(div);
  });
}

// ─── Keyboard shortcuts ──────────────────────────────────────
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'||e.key==='ArrowDown')nextSlide();
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')prevSlide();
  if(e.key==='e'&&(e.ctrlKey||e.metaKey)){e.preventDefault();exportCurrent();}
});

// ─── Init ────────────────────────────────────────────────────
buildSidebar();
updateDots();
updateNav();
setTimeout(function(){zoomFit();redraw();},50);
window.addEventListener('resize',function(){zoomFit();});
</script>
</body>
</html>
